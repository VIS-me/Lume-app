<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Checklist</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }
        /* Исправлено: добавление рамки при выборе статуса */
        .status-check:checked + .status-label { 
            border-color: #0088cc !important; 
            background: rgba(0, 136, 204, 0.2); 
            color: white;
        }
        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            color: white;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .btn-send {
            background: #0088cc;
            box-shadow: 0 10px 20px -5px rgba(0, 136, 204, 0.3);
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #0088cc;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 pb-12">

    <div class="flex items-center justify-between mb-8">
        <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full border border-white/10">
            <span class="text-xl">←</span>
        </button>
        <h1 class="text-lg font-bold italic">Technical Checklist</h1>
        <div class="w-10"></div>
    </div>

    <div id="loading-state" class="flex flex-col items-center justify-center py-20 space-y-4">
        <div class="loader"></div>
        <p class="text-[10px] uppercase font-black tracking-[0.2em] text-slate-500">Синхронизация с базой объектов...</p>
    </div>

    <div id="checklist-container" class="space-y-6 hidden">
        </div>

    <div id="footer-section" class="hidden">
        <button id="submit-btn" onclick="sendFullReport()" class="w-full mt-8 py-4 btn-send rounded-3xl font-black uppercase text-[10px] tracking-[0.2em] active:scale-[0.98] transition-all">
            Отправить отчет
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_BASE = "https://sinuate-inez-proempire.ngrok-free.dev";
        // Важно: берем объекты через API_BASE + /api/admin_items, как в последних правках бэкенда
        const API_ITEMS = `${API_BASE}/api/admin_items`;
        const API_SUBMIT = `${API_BASE}/api/submit_checklist`;
        
        const urlParams = new URLSearchParams(window.location.search);
        const USER_INFO = {
            user_id: urlParams.get('user_id') || tg.initDataUnsafe?.user?.id,
            complex_id: urlParams.get('complex_id') || '1'
        };

        let loadedItems = [];

        async function init() {
            if (!USER_INFO.user_id) {
                document.getElementById('loading-state').innerHTML = `<p class="text-red-500 text-[9px] font-black uppercase">Ошибка: User ID не найден</p>`;
                return;
            }

            try {
                // ПЕРЕДАЕМ user_id и complex_id, чтобы избежать ошибки bigint: "None"
                const response = await fetch(`${API_ITEMS}?user_id=${USER_INFO.user_id}&complex_id=${USER_INFO.complex_id}`, {
                    headers: { 
                        'ngrok-skip-browser-warning': 'true',
                        'X-Telegram-Init-Data': tg.initData || ''
                    }
                });
                
                if (!response.ok) throw new Error(`Server Error: ${response.status}`);
                
                const data = await response.json();
                // Бэкенд возвращает объекты в поле items. Используем поле area_object.
                loadedItems = data.items || [];

                if (loadedItems.length === 0) {
                    throw new Error("Нет данных в таблице services");
                }

                renderChecklist(loadedItems);
            } catch (err) {
                console.error("Load error:", err);
                document.getElementById('loading-state').innerHTML = `
                    <p class="text-red-500 text-[9px] font-black uppercase tracking-widest">Ошибка загрузки объектов</p>
                `;
            }
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist-container');
            
            container.innerHTML = items.map((item, index) => {
                const name = item.area_object || "Без названия";
                return `
                    <div class="glass-card p-5">
                        <p class="text-[10px] text-blue-400 font-black uppercase tracking-wider mb-4">${name}</p>
                        
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            ${['Норма', 'Внимание', 'Авария'].map(status => `
                                <label class="relative cursor-pointer">
                                    <input type="radio" name="status-${index}" value="${status}" ${status === 'Норма' ? 'checked' : ''} class="status-check hidden">
                                    <div class="status-label border border-white/5 rounded-xl py-2 text-center transition-all bg-white/5">
                                        <span class="text-[8px] font-black uppercase ${getStatusColor(status)}">${status}</span>
                                    </div>
                                </label>
                            `).join('')}
                        </div>

                        <input type="text" id="note-${index}" placeholder="Примечание к объекту..." class="text-[12px]">
                    </div>
                `;
            }).join('');

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('checklist-container').classList.remove('hidden');
            document.getElementById('footer-section').classList.remove('hidden');
        }

        function getStatusColor(status) {
            if (status === 'Норма') return 'text-green-500';
            if (status === 'Внимание') return 'text-yellow-500';
            return 'text-red-500';
        }

        async function sendFullReport() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "ОТПРАВКА...";
            
            const items = loadedItems.map((item, index) => ({
                name: item.area_object,
                status: document.querySelector(`input[name="status-${index}"]:checked`).value,
                note: document.getElementById(`note-${index}`).value
            }));

            const payload = {
                user_id: USER_INFO.user_id,
                complex_id: USER_INFO.complex_id,
                object_name: "Технический обход",
                items: items,
                lang: "ru"
            };

            try {
                const response = await fetch(API_SUBMIT, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData || ''
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    submitBtn.innerText = "ОТЧЕТ ПРИНЯТ";
                    submitBtn.style.background = "#22c55e";
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => goBack(), 1500);
                } else {
                    const errData = await response.json();
                    throw new Error(errData.error || "Ошибка отправки");
                }
            } catch (err) {
                tg.showAlert("Не удалось отправить: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Отправить отчет";
            }
        }

        function goBack() {
            window.location.href = `index.html?user_id=${USER_INFO.user_id}&complex_id=${USER_INFO.complex_id}`;
        }

        init();
    </script>
</body>
</html>
