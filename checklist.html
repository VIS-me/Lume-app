<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Checklist</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f111a] text-white p-6">
    <div id="status-debug" class="text-[10px] text-slate-500 mb-4 font-mono"></div>
    <div id="loading-state" class="py-20 text-center">
        <p id="error-msg" class="text-blue-400 animate-pulse">СИНХРОНИЗАЦИЯ...</p>
    </div>
    <div id="checklist-container" class="space-y-4 hidden"></div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = "https://sinuate-inez-proempire.ngrok-free.dev";
        const debug = document.getElementById('status-debug');

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id') || tg.initDataUnsafe?.user?.id;
            const complexId = urlParams.get('complex_id') || '1';
            
            debug.innerText = `Connecting to: ${API_BASE} | User: ${userId}`;

            try {
                const response = await fetch(`${API_BASE}/api/admin_items?user_id=${userId}&complex_id=${complexId}`, {
                    headers: {
                        'X-Telegram-Init-Data': tg.initData || '',
                        'ngrok-skip-browser-warning': 'true'
                    }
                });

                if (!response.ok) {
                    throw new Error(`SERVER_ERROR_${response.status}`);
                }

                const data = await response.json();
                console.log("Server Response:", data);

                // Пытаемся найти данные в любом из возможных ключей
                const items = data.items || data.area_objects || data.data || (Array.isArray(data) ? data : null);

                if (!items || items.length === 0) {
                    throw new Error("EMPTY_DATA_FROM_SERVER");
                }

                render(items);
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').className = "text-red-500";
                document.getElementById('error-msg').innerText = `ОШИБКА: ${err.message}`;
                debug.innerText += ` | Fail: ${err.message}`;
            }
        }

        function render(items) {
            const container = document.getElementById('checklist-container');
            container.innerHTML = items.map((item, index) => {
                const name = item.Area_object || item.area_object || (typeof item === 'string' ? item : 'Unnamed');
                return `
                    <div class="p-4 rounded-2xl bg-white/5 border border-white/10">
                        <p class="text-blue-400 text-xs font-bold uppercase">${name}</p>
                        <div class="flex gap-2 mt-3">
                            <div class="flex-1 py-2 text-center bg-green-500/20 text-green-500 text-[10px] rounded-lg border border-green-500/30">NORM</div>
                            <div class="flex-1 py-2 text-center bg-white/5 text-slate-500 text-[10px] rounded-lg border border-white/10">WARN</div>
                            <div class="flex-1 py-2 text-center bg-white/5 text-slate-500 text-[10px] rounded-lg border border-white/10">ERR</div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('loading-state').classList.add('hidden');
            container.classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
