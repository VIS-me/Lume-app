<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Checklist</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }
        .status-check:checked + .status-label { 
            border-color: #0088cc; 
            background: rgba(0, 136, 204, 0.1); 
        }
        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            color: white;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .btn-send {
            background: #0088cc;
            box-shadow: 0 10px 20px -5px rgba(0, 136, 204, 0.3);
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #0088cc;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 pb-12">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full border border-white/10">
            <span class="text-xl">←</span>
        </button>
        <h1 id="header-title" class="text-lg font-bold italic">Technical Checklist</h1>
        <div class="w-10"></div>
    </div>

    <!-- Загрузка -->
    <div id="loading-state" class="flex flex-col items-center justify-center py-20 space-y-4">
        <div class="loader"></div>
        <p id="loading-text" class="text-[10px] uppercase font-black tracking-[0.2em] text-slate-500">Загрузка объектов из Services...</p>
    </div>

    <div id="checklist-container" class="space-y-6 hidden">
        <!-- Сюда попадут объекты из столбца Area_object -->
    </div>

    <div id="footer-section" class="hidden">
        <button id="btn-send-report" onclick="sendFullReport()" class="w-full mt-8 py-4 btn-send rounded-3xl font-black uppercase text-[10px] tracking-[0.2em] active:scale-[0.98] transition-all">
            Отправить отчет
        </button>
    </div>

    <!-- Translations & Scripts -->
    <script src="translations.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function getLang() {
            const code = (tg.initDataUnsafe?.user?.language_code || 'en').toLowerCase();
            if (code.includes('ru')) return 'ru';
            if (code.includes('uk')) return 'uk';
            if (['sr', 'hr', 'bs', 'me'].some(x => code.includes(x))) return 'sr';
            return 'en';
        }
        const lang = getLang();
        const t = (key) => translations[lang][key] || translations['en'][key] || key;

        const API_BASE = "";
        const API_DATA = `${API_BASE}/api/data`;
        const API_SUBMIT = `${API_BASE}/api/submit_checklist`;
        
        const urlParams = new URLSearchParams(window.location.search);
        const USER_INFO = {
            user_id: urlParams.get('user_id') || tg.initDataUnsafe?.user?.id,
            complex_id: urlParams.get('complex_id')
        };

        let loadedCategories = [];

        function updateStaticTranslations() {
            document.getElementById('header-title').innerText = t('chk_title');
            document.getElementById('btn-send-report').innerText = t('chk_send');
            document.getElementById('loading-text').innerText = t('chk_load');
        }

        async function init() {
            updateStaticTranslations();
            try {
                const response = await fetch(`${API_DATA}?user_id=${USER_INFO.user_id}&complex_id=${USER_INFO.complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                
                loadedCategories = (data.area_objects || []).filter(item => item && item.trim() !== "");

                if (loadedCategories.length === 0) {
                    throw new Error("Список объектов пуст");
                }

                renderChecklist(loadedCategories);
            } catch (err) {
                console.error("Load error:", err);
                document.getElementById('loading-state').innerHTML = `
                    <p class="text-red-500 text-[9px] font-black uppercase tracking-widest">${t('chk_err_load')}</p>
                `;
            }
        }

        function renderChecklist(categories) {
            const container = document.getElementById('checklist-container');
            
            const statuses = [
                { key: 'chk_norm', color: 'text-green-500' }, 
                { key: 'chk_warn', color: 'text-yellow-500' }, 
                { key: 'chk_err', color: 'text-red-500' }
            ];

            container.innerHTML = categories.map((name, index) => {
                const id = `cat_${index}`;
                return `
                    <div class="glass-card p-5">
                        <p class="text-[10px] text-blue-400 font-black uppercase tracking-wider mb-4">${name}</p>
                        
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            ${statuses.map((status, sIdx) => `
                                <label class="relative cursor-pointer">
                                    <input type="radio" name="status-${id}" value="${status.key}" ${sIdx === 0 ? 'checked' : ''} class="status-check hidden">
                                    <div class="status-label border border-white/5 rounded-xl py-2 text-center transition-all bg-white/5">
                                        <span class="text-[8px] font-black uppercase ${status.color}">${t(status.key)}</span>
                                    </div>
                                </label>
                            `).join('')}
                        </div>

                        <input type="text" id="note-${id}" placeholder="${t('chk_comment')}" class="text-[12px]">
                    </div>
                `;
            }).join('');

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('checklist-container').classList.remove('hidden');
            document.getElementById('footer-section').classList.remove('hidden');
        }

        async function sendFullReport() {
            const btn = tg.MainButton;
            btn.setText("ОТПРАВКА...").show();
            
            // Собираем данные по каждому пункту
            const items = loadedCategories.map((name, index) => {
                const statusKey = document.querySelector(`input[name="status-cat_${index}"]:checked`).value;
                return {
                    name: name,
                    status: statusKey, // e.g. chk_norm
                    note: document.getElementById(`note-cat_${index}`).value
                };
            });

            const payload = {
                user_id: USER_INFO.user_id,
                complex_id: USER_INFO.complex_id,
                object_name: t('chk_title'), // Добавлено название для PDF и БД (уже переведенное!)
                items: items, 
                timestamp: new Date().toLocaleString('ru-RU'),
                lang: lang
            };

            try {
                const response = await fetch(API_SUBMIT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    btn.setText(t('success')).setParams({ color: "#22c55e" });
                    setTimeout(() => goBack(), 1500);
                } else {
                    throw new Error();
                }
            } catch (err) {
                tg.showAlert(t('error_conn'));
                btn.hide();
            }
        }

        function goBack() {
            window.location.href = `index.html?user_id=${USER_INFO.user_id}&complex_id=${USER_INFO.complex_id}`;
        }

        init();
    </script>
</body>
</html>
