<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Checklist</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }
        .status-check:checked + .status-label { 
            border-color: #0088cc; 
            background: rgba(0, 136, 204, 0.1); 
        }
        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            color: white;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .btn-send {
            background: #0088cc;
            box-shadow: 0 10px 20px -5px rgba(0, 136, 204, 0.3);
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #0088cc;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 pb-12">

    <div class="flex items-center justify-between mb-8">
        <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full border border-white/10">
            <span class="text-xl">←</span>
        </button>
        <h1 id="header-title" class="text-lg font-bold italic">Technical Checklist</h1>
        <div class="w-10"></div>
    </div>

    <div id="loading-state" class="flex flex-col items-center justify-center py-20 space-y-4">
        <div class="loader"></div>
        <p id="loading-text" class="text-[10px] uppercase font-black tracking-[0.2em] text-slate-500">Загрузка объектов...</p>
    </div>

    <div id="checklist-container" class="space-y-6 hidden">
        </div>

    <div id="footer-section" class="hidden">
        <button id="btn-send-report" onclick="sendFullReport()" class="w-full mt-8 py-4 btn-send rounded-3xl font-black uppercase text-[10px] tracking-[0.2em] active:scale-[0.98] transition-all">
            Отправить отчет
        </button>
    </div>

    <script src="translations.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Secure fetch wrapper
        const originalFetch = window.fetch;
        window.fetch = async function() {
            const args = arguments;
            const tgInitData = tg.initData || '';
            if (args.length > 1) {
                args[1].headers = { ...args[1].headers, 'X-Telegram-Init-Data': tgInitData };
            } else {
                args[1] = { headers: { 'X-Telegram-Init-Data': tgInitData } };
            }
            return originalFetch.apply(this, args);
        };

        function getLang() {
            const code = (tg.initDataUnsafe?.user?.language_code || 'en').toLowerCase();
            if (code.includes('ru')) return 'ru';
            if (code.includes('uk')) return 'uk';
            if (['sr', 'hr', 'bs', 'me'].some(x => code.includes(x))) return 'sr';
            return 'en';
        }
        const lang = getLang();
        const t = (key) => (window.translations && translations[lang] && translations[lang][key]) || key;

        const API_BASE = window.location.origin;
        const API_GET_ITEMS = `${API_BASE}/api/admin_items`;
        const API_SUBMIT = `${API_BASE}/api/submit_checklist`;
        
        const urlParams = new URLSearchParams(window.location.search);
        const USER_INFO = {
            user_id: urlParams.get('user_id') || tg.initDataUnsafe?.user?.id,
            complex_id: urlParams.get('complex_id')
        };

        let loadedItems = [];

        function updateStaticTranslations() {
            document.getElementById('header-title').innerText = t('chk_title') || "Technical Checklist";
            document.getElementById('btn-send-report').innerText = t('chk_send') || "Отправить отчет";
            document.getElementById('loading-text').innerText = t('chk_load') || "Загрузка объектов...";
        }

        async function init() {
            updateStaticTranslations();
            try {
                // Запрашиваем данные из нового эндпоинта admin_items
                const response = await fetch(`${API_GET_ITEMS}?user_id=${USER_INFO.user_id}&complex_id=${USER_INFO.complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                
                // Исправлено: берем данные из data.items как в твоем Python коде
                loadedItems = data.items || [];

                if (loadedItems.length === 0) {
                    throw new Error("Список объектов пуст");
                }

                renderChecklist(loadedItems);
            } catch (err) {
                console.error("Load error:", err);
                document.getElementById('loading-state').innerHTML = `
                    <p class="text-red-500 text-[9px] font-black uppercase tracking-widest">Ошибка загрузки</p>
                `;
            }
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist-container');
            
            const statuses = [
                { key: 'chk_norm', color: 'text-green-500', label: t('chk_norm') || "OK" }, 
                { key: 'chk_warn', color: 'text-yellow-500', label: t('chk_warn') || "Увага" }, 
                { key: 'chk_err', color: 'text-red-500', label: t('chk_err') || "Ошибка" }
            ];

            container.innerHTML = items.map((item, index) => {
                const areaName = item.Area_object || item.area_object || "Unnamed Area";
                const category = item.Category || item.category || "";
                const id = `cat_${index}`;

                return `
                    <div class="glass-card p-5" data-index="${index}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[8px] opacity-40 uppercase font-black tracking-widest">${category}</p>
                                <p class="text-[12px] text-blue-400 font-black uppercase tracking-wider" id="name-${id}">${areaName}</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            ${statuses.map((status, sIdx) => `
                                <label class="relative cursor-pointer">
                                    <input type="radio" name="status-${id}" value="${status.key}" ${sIdx === 0 ? 'checked' : ''} class="status-check hidden">
                                    <div class="status-label border border-white/5 rounded-xl py-2 text-center transition-all bg-white/5">
                                        <span class="text-[8px] font-black uppercase ${status.color}">${status.label}</span>
                                    </div>
                                </label>
                            `).join('')}
                        </div>

                        <input type="text" id="note-${id}" placeholder="${t('chk_comment') || 'Комментарий...'}" class="text-[12px]">
                    </div>
                `;
            }).join('');

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('checklist-container').classList.remove('hidden');
            document.getElementById('footer-section').classList.remove('hidden');
        }

        async function sendFullReport() {
            const btn = document.getElementById('btn-send-report');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerText = "ОТПРАВКА...";
            
            const itemsReport = loadedItems.map((item, index) => {
                const id = `cat_${index}`;
                const areaName = item.Area_object || item.area_object;
                const statusInput = document.querySelector(`input[name="status-${id}"]:checked`);
                const noteInput = document.getElementById(`note-${id}`);
                
                return {
                    name: areaName,
                    status: statusInput ? statusInput.value : 'chk_norm',
                    note: noteInput ? noteInput.value : ""
                };
            });

            const payload = {
                user_id: USER_INFO.user_id,
                complex_id: USER_INFO.complex_id,
                object_name: t('chk_title') || "Technical Checklist",
                items: itemsReport, 
                timestamp: new Date().toLocaleString('ru-RU'),
                lang: lang
            };

            try {
                const response = await fetch(API_SUBMIT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    btn.innerText = t('success') || "ОТПРАВЛЕНО";
                    btn.style.backgroundColor = "#22c55e";
                    setTimeout(() => goBack(), 1500);
                } else {
                    throw new Error();
                }
            } catch (err) {
                tg.showAlert(t('error_conn') || "Ошибка соединения");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function goBack() {
            window.location.href = `index.html?user_id=${USER_INFO.user_id}&complex_id=${USER_INFO.complex_id}`;
        }

        init();
    </script>
</body>
</html>
