<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Дополнительные стили для нежного свечения */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 191, 36, 0.1); /* Золотистая граница 10% */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .gold-glow {
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
        }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-24">
    <div id="app" class="max-w-md mx-auto p-5">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-amber-400 font-mono gold-glow">
                LUME<sup class="text-xs ml-0.5 font-normal">©</sup>
            </h1>
            <div id="status-dot" class="flex items-center text-[10px] text-slate-500 uppercase tracking-widest">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                Online
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 mb-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-amber-400/80 text-xs font-bold uppercase tracking-wider mb-1">Welcome!</p>
                    <h2 id="complex-display-name" class="text-xl font-semibold">Загрузка...</h2>
                    <p id="city-name" class="text-slate-400 text-sm italic">Локация...</p>
                </div>
                <div class="text-right">
                    <span id="temp" class="text-4xl font-light tracking-tighter">--°</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/5 text-slate-300">
                <div class="flex items-center text-sm">
                    <span class="mr-2">💧</span>
                    <span id="humidity">--%</span>
                </div>
                <div class="flex items-center text-sm">
                    <span class="mr-2">💨</span>
                    <span id="wind">-- м/с</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] p-6 mb-6">
            <h3 class="text-slate-400 text-[10px] uppercase tracking-[0.2em] mb-4">Контакты и Поддержка</h3>
            
            <div class="space-y-4">
                <a href="#" id="uk-tg" class="flex items-center justify-between group">
                    <div class="flex items-center">
                        <span class="bg-amber-400/10 p-2 rounded-lg mr-3 group-active:scale-90 transition-transform">📱</span>
                        <span class="text-sm font-medium">Управляющая компания</span>
                    </div>
                    <span class="text-slate-500">→</span>
                </a>

                <a href="#" id="uk-email" class="flex items-center justify-between group">
                    <div class="flex items-center">
                        <span class="bg-amber-400/10 p-2 rounded-lg mr-3 group-active:scale-90 transition-transform">✉️</span>
                        <span class="text-sm font-medium italic" id="email-text">mail@lume.com</span>
                    </div>
                    <span class="text-slate-500">→</span>
                </a>

                <button onclick="alert('Вызов экстренных служб...')" class="w-full mt-2 bg-red-500/10 border border-red-500/20 text-red-400 py-3 rounded-xl text-xs font-bold uppercase tracking-widest">
                    ⚠️ Экстренные телефоны
                </button>
            </div>
        </div>

        <div id="admin-block" class="hidden animate-fade-in">
            <button class="glass-card w-full rounded-2xl p-5 flex items-center justify-between border-amber-400/30">
                <div class="flex items-center">
                    <span class="text-xl mr-4">🔑</span>
                    <div class="text-left">
                        <span class="block text-sm font-bold text-amber-400">Панель управления</span>
                        <span class="text-[10px] text-slate-500">Доступ: Director / Engineer</span>
                    </div>
                </div>
                <span class="bg-amber-400 text-black text-[10px] px-2 py-1 rounded font-bold italic">STAFF</span>
            </button>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-lg border-t border-white/5 px-8 py-4 flex justify-between items-center z-50">
        <button class="flex flex-col items-center text-amber-400">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] mt-1 font-bold uppercase">Главная</span>
        </button>
        <button class="flex flex-col items-center text-slate-500 opacity-50">
            <span class="text-xl">📋</span>
            <span class="text-[10px] mt-1 font-bold uppercase">Заявки</span>
        </button>
        <button class="flex flex-col items-center text-slate-500 opacity-50">
            <span class="text-xl">👤</span>
            <span class="text-[10px] mt-1 font-bold uppercase">Профиль</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_URL = "https://sinuate-inez-proempire.ngrok-free.dev/api/data";

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            const user_id = tg.initDataUnsafe?.user?.id || "6642689395"; 

            try {
                const response = await fetch(`${API_URL}?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                
                const data = await response.json();
                
                // Наполняем данными
                document.getElementById('complex-display-name').innerText = data.complex_name || "LUME";
                document.getElementById('city-name').innerText = data.weather.city || "Montenegro";
                document.getElementById('temp').innerText = (data.weather.temp || "--") + "°";
                document.getElementById('humidity').innerText = (data.weather.hum || "--") + "%";
                document.getElementById('wind').innerText = (data.weather.wind || "0") + " м/с";
                
                // Контакты
                document.getElementById('uk-tg').href = data.contacts.tg_link || "#";
                document.getElementById('uk-email').href = "mailto:" + (data.contacts.email || "");
                document.getElementById('email-text').innerText = data.contacts.email || "support@lume.me";

                // Проверка роли для кнопки управления
                if (data.role === 'director' || data.role === 'engineer') {
                    document.getElementById('admin-block').classList.remove('hidden');
                }

            } catch (err) {
                console.error("Ошибка загрузки:", err);
            }
        }

        loadData();
    </script>
</body>
</html>
