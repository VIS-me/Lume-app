<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }
        #modal-overlay {
            background: rgba(15, 17, 26, 0.98);
            display: none;
        }
        .page { display: none; }
        .page.active { display: block; }
        .nav-btn { color: #475569; transition: all 0.2s; }
        .nav-btn.active { color: #0088cc; }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 1rem;
            color: white;
            width: 100%;
            outline: none;
        }
        .finance-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 0;
        }
        option { background: #1e293b; color: white; }
        #modal-body::-webkit-scrollbar { width: 4px; }
        #modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .action-btn-secondary {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.8rem;
            transition: opacity 0.2s;
        }
        .action-btn-secondary:active { opacity: 0.7; }
        .btn-label-base {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-24">

    <div id="app" class="max-w-md mx-auto p-6">
        
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold text-[#0088cc] italic">Lume<sup class="text-[10px] font-normal">©</sup></h1>
            <div id="status-label" class="text-[9px] font-black uppercase tracking-[0.2em] text-blue-500/50" data-i18n="status_live">System Live</div>
        </div>

        <!-- HOME PAGE -->
        <div id="page-home" class="page active">
            <div class="glass-card p-8 mb-6">
                <p data-i18n="welcome" class="text-blue-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">WELCOME!</p>
                <h2 id="complex-display-name" class="text-2xl font-bold italic mb-8">--</h2>
                <div class="flex justify-between items-end">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <p data-i18n="hum" class="text-[8px] text-slate-500 uppercase font-black mb-1">Hum</p>
                            <p id="humidity" class="text-lg font-bold">--%</p>
                        </div>
                        <div>
                            <p data-i18n="wind" class="text-[8px] text-slate-500 uppercase font-black mb-1">Wind</p>
                            <p id="wind" class="text-lg font-bold">--</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span id="temp" class="text-5xl font-light tracking-tighter text-white whitespace-nowrap">--°C</span>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 space-y-3 mb-6">
                <button onclick="openModal('emergency')" class="action-btn-secondary bg-red-500/5 border-red-500/10">
                    <span data-i18n="emergency" class="btn-label-base text-red-500">Emergency</span>
                    <span class="text-red-500/20 text-xs">🚨</span>
                </button>
                <button onclick="openModal('uk')" class="action-btn-secondary">
                    <span data-i18n="management" class="btn-label-base text-slate-300">Management</span>
                    <span class="text-slate-600 text-xs">🏢</span>
                </button>
                <button onclick="openModal('support')" class="action-btn-secondary">
                    <span data-i18n="support" class="btn-label-base text-slate-300">Support</span>
                    <span class="text-slate-600 text-xs">✉️</span>
                </button>
            </div>
        </div>

        <!-- TASKS PAGE -->
        <div id="page-tasks" class="page">
            <div class="glass-card p-6 space-y-4">
                <button onclick="openModal('create-order')" class="w-full py-3 bg-blue-600/10 border border-blue-600/20 rounded-3xl flex flex-col items-center justify-center space-y-2 active:bg-blue-600/20">
                    <span data-i18n="create_request" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Create New Request</span>
                </button>

                <button onclick="openModal('in-progress')" class="w-full py-3 bg-white/5 border border-white/10 rounded-3xl flex flex-col items-center justify-center space-y-2 active:bg-white/10">
                    <span data-i18n="in_progress" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">In Progress</span>
                </button>

                <div id="admin-block" class="hidden mt-4 space-y-3">
                    <button data-i18n="notification" onclick="openModal('notifications')" class="w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">Notification</button>
                    <button data-i18n="debtors_list" onclick="openModal('debtors')" class="w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">Debtors List</button>
                    <button data-i18n="payment_reminder" onclick="openModal('payment-reminders')" class="w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">Payment reminder</button>
                    <button id="pdf-report-btn" data-i18n="pdf_report" onclick="openModal('pdf-report-confirm')" class="hidden w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">PDF Report</button>
                    <button id="engineer-btn" data-i18n="checklist" onclick="openChecklist()" class="hidden w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">Checklist</button>
                </div>
            </div>
        </div>

        <!-- PROFILE PAGE -->
        <div id="page-profile" class="page">
            <div class="glass-card p-8 mb-6 text-center">
                <div class="flex items-center space-x-6 mb-6 text-left">
                    <img id="profile-avatar" src="" alt="👤" class="w-20 h-20 rounded-full border border-blue-600/20 shadow-lg object-cover bg-slate-800 shrink-0">
                    <div>
                        <h3 id="profile-name" class="text-xl font-bold italic tracking-tight">--</h3>
                        <p id="profile-role" class="text-[9px] text-blue-400 font-black uppercase tracking-[0.4em] mt-1">--</p>
                        <p class="text-[10px] text-slate-500 mt-2 font-mono"><span data-i18n="apartment">Апартамент</span>: <span id="apt-numbers">--</span></p>
                    </div>
                </div>
                <button data-i18n="edit" onclick="openModal('edit-profile')" class="w-full text-[10px] font-black uppercase bg-white/5 px-6 py-3 rounded-full text-slate-400 border border-white/5 active:bg-white/10">Изменить</button>
            </div>

            <div class="glass-card p-8">
                <h4 class="text-xl font-bold italic mb-6"><span data-i18n="to_pay">К оплате на</span> <span id="payment-date" class="text-slate-400 text-sm font-medium">--</span></h4>
                <div class="space-y-1">
                    <div class="flex justify-between finance-item">
                        <span data-i18n="total" class="text-xs text-slate-500 font-medium">всего</span>
                        <span class="text-xl font-black"><span id="p-total-debt">0.00</span> <span class="currency-label">€</span></span>
                    </div>
                    <div id="finance-details" class="space-y-1">
                        <div class="flex justify-between finance-item text-slate-300">
                            <span data-i18n="maintenance" class="text-xs font-medium">содержание</span>
                            <span id="debt-maintenance" class="text-sm font-bold">0.00 €</span>
                        </div>
                        <div class="flex justify-between finance-item text-slate-300">
                            <span data-i18n="hot_water" class="text-xs font-medium">горячая вода</span>
                            <span id="debt-hotwater" class="text-sm font-bold">0.00 €</span>
                        </div>
                        <div class="flex justify-between finance-item text-slate-300">
                            <span data-i18n="garage" class="text-xs font-medium">гараж</span>
                            <span id="debt-garage" class="text-sm font-bold">0.00 €</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-end justify-center" onclick="closeModal()">
        <div class="w-full bg-[#1e293b] rounded-t-[3.5rem] p-10 pb-16 shadow-2xl transition-transform duration-300" onclick="event.stopPropagation()">
            <div id="modal-body" class="max-h-[60vh] overflow-y-auto"></div>
            <button data-i18n="close" onclick="closeModal()" class="w-full mt-8 py-4 rounded-2xl bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-500 active:bg-white/10">Close</button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/80 backdrop-blur-xl border-t border-white/5 px-12 py-7 flex justify-between items-center z-50">
        <button onclick="switchPage('home')" id="nav-home" class="nav-btn active flex flex-col items-center">
            <span class="text-2xl">🏠</span>
            <span data-i18n="home_nav" class="text-[8px] mt-1 font-black uppercase">Home</span>
        </button>
        <button onclick="switchPage('tasks')" id="nav-tasks" class="nav-btn flex flex-col items-center">
            <span class="text-2xl">📋</span>
            <span data-i18n="tasks_nav" class="text-[8px] mt-1 font-black uppercase">Tasks</span>
        </button>
        <button onclick="switchPage('profile')" id="nav-profile" class="nav-btn flex flex-col items-center">
            <span class="text-2xl">👤</span>
            <span data-i18n="profile_nav" class="text-[8px] mt-1 font-black uppercase">Profile</span>
        </button>
    </nav>

    <script>
        // Безопасная инициализация Telegram Web App
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : {
            initDataUnsafe: { user: { id: 'test', language_code: 'en', first_name: 'Resident' } },
            ready: () => {}, expand: () => {}, showAlert: alert,
            MainButton: { show: () => {}, hide: () => {}, setText: function() { return this; } }
        };
        
        try { tg.expand(); tg.ready(); } catch(e) {}

        // --- БЕЗОПАСНЫЕ ХЕЛПЕРЫ ---
        const safeSetText = (id, text) => {
            const el = document.getElementById(id);
            if (el) el.innerText = text;
        };
        const safeGetValue = (id) => {
            const el = document.getElementById(id);
            return el ? el.value.trim() : '';
        };

        // --- ЛОКАЛИЗАЦИЯ ---
        const userLang = tg.initDataUnsafe?.user?.language_code || 'en';
        
        // Безопасная функция перевода (не упадет, если translations.js не загрузился)
        const t = (key) => {
            try {
                if (typeof translations !== 'undefined') {
                    const lang = translations[userLang] ? userLang : 'en';
                    if (translations[lang] && translations[lang][key]) return translations[lang][key];
                    if (translations['en'] && translations['en'][key]) return translations['en'][key];
                }
            } catch (e) {}
            return key; // Возвращаем ключ, если перевода нет
        };

        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = t(key);
            });
        }

        // --- UI КОМПОНЕНТЫ ---
        const UI = {
            title: (text, color = 'text-blue-400') => `<h2 class="text-xl font-bold mb-6 italic ${color}">${text}</h2>`,
            input: (id, placeholder, value = '', type = 'text', cls = 'mb-3') => `<input type="${type}" id="${id}" class="text-sm ${cls}" placeholder="${placeholder}" value="${value}">`,
            textarea: (id, placeholder, cls = 'h-32 mb-4') => `<textarea id="${id}" class="text-sm ${cls}" placeholder="${placeholder}"></textarea>`,
            btn: (action, text) => `<button onclick="${action}" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-[10px] tracking-widest active:bg-blue-700 transition-colors">${text}</button>`,
            card: (content, cls = 'p-4 mb-2') => `<div class="bg-white/5 rounded-2xl border border-white/5 ${cls}">${content}</div>`,
            label: (text) => `<p class="text-[10px] text-slate-500 mb-2 uppercase font-black">${text}</p>`
        };

        // --- ЛОГИКА ПРИЛОЖЕНИЯ ---
        const API_BASE = "https://sinuate-inez-proempire.ngrok-free.dev";
        const ENDPOINTS = {
            data: `${API_BASE}/api/data`,
            update: `${API_BASE}/api/update_contacts`,
            order: `${API_BASE}/api/create_order`,
            broadcast: `${API_BASE}/api/broadcast`,
            remind: `${API_BASE}/api/remind_payment`,
            report: `${API_BASE}/api/send_pdf_report`
        };
        
        const urlParams = new URLSearchParams(window.location.search);
        const APP_CONFIG = {
            complex_id: urlParams.get('complex_id') || '',
            user_id: urlParams.get('user_id') || tg.initDataUnsafe?.user?.id || ''
        };

        let cachedData = {};
        let isStaff = false;

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === `page-${pageId}`));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === `nav-${pageId}`));
        }

        async function loadData() {
            applyStaticTranslations();

            if(tg.initDataUnsafe?.user?.photo_url) {
                const avatar = document.getElementById('profile-avatar');
                if(avatar) avatar.src = tg.initDataUnsafe.user.photo_url;
            }
            safeSetText('profile-name', tg.initDataUnsafe?.user?.first_name || 'Resident');

            if (!APP_CONFIG.complex_id || !APP_CONFIG.user_id) {
                safeSetText('status-label', 'Missing Params');
                document.getElementById('status-label')?.classList.replace('text-blue-500/50', 'text-red-500/50');
                return;
            }

            try {
                const response = await fetch(`${ENDPOINTS.data}?user_id=${APP_CONFIG.user_id}&complex_id=${APP_CONFIG.complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                cachedData = data || {};
                
                const roleLower = (cachedData.role || "").toLowerCase();
                isStaff = ['engineer', 'director', 'administrator', 'staff'].some(r => roleLower.includes(r));
                const f = cachedData.finance || {};
                const cur = f.currency || "€";

                // Безопасное обновление DOM
                safeSetText('complex-display-name', cachedData.complex_name || "--");
                safeSetText('humidity', cachedData.weather?.hum || "--%");
                safeSetText('wind', cachedData.weather ? `${cachedData.weather.wind || "0"} m/s` : "--");
                safeSetText('temp', cachedData.weather ? `${String(cachedData.weather.temp || "0").replace(/[^\d.-]/g, '')}°C` : "--°C");
                safeSetText('apt-numbers', Array.isArray(cachedData.apt) ? cachedData.apt.join(', ') : (cachedData.apt || "--"));
                safeSetText('profile-role', cachedData.role || "--");
                safeSetText('p-total-debt', f.Total_Debt || "0.00");
                safeSetText('debt-maintenance', `${f.Maintenance_Fee || "0.00"} ${cur}`);
                safeSetText('debt-hotwater', `${f.Hot_Water_Debt || "0.00"} ${cur}`);
                safeSetText('debt-garage', `${f.Garage_Debt || "0.00"} ${cur}`);
                safeSetText('payment-date', f.last_update || "--");

                document.querySelectorAll('.currency-label').forEach(el => el.innerText = cur);

                if (isStaff) {
                    document.getElementById('admin-block')?.classList.remove('hidden');
                    const isEngineer = roleLower.includes('engineer');
                    if(isEngineer) {
                        document.getElementById('engineer-btn')?.classList.remove('hidden');
                        document.getElementById('pdf-report-btn')?.classList.remove('hidden');
                    }
                }

            } catch (err) { 
                console.error("Data loading error:", err);
                safeSetText('status-label', t('status_offline'));
                document.getElementById('status-label')?.classList.replace('text-blue-500/50', 'text-red-500/50');
            }
        }

        function getTasksHtml() {
            const orders = cachedData?.active_orders || [];
            if (!orders.length) return `<p class="text-[9px] text-slate-600 text-center py-10 uppercase font-black tracking-widest">${t('no_requests')}</p>`;

            const filtered = orders.filter(o => isStaff ? !['done', 'выполнено', 'отменено', 'cancelled'].includes(String(o.status || "").toLowerCase()) : true);
            if (!filtered.length) return `<p class="text-[9px] text-slate-600 text-center py-10 uppercase font-black tracking-widest">${t('no_active')}</p>`;

            return filtered.map(o => {
                const sVal = String(o.status || "").toLowerCase();
                const isInProgress = sVal.includes('progress') || sVal.includes('работе');
                return UI.card(`
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col flex-1 mr-2">
                            ${isStaff ? `<span class="text-[8px] text-slate-500 font-mono mb-1">${t('apartment')}: ${o.apt || '??'}</span>` : ''}
                            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-tight">${o.category || 'Request'}</span>
                            <span class="text-[11px] text-slate-300 line-clamp-2">${o.desc || 'No description'}</span>
                        </div>
                        <span class="text-[8px] font-black px-2 py-1 rounded-full ${isInProgress ? 'bg-blue-500/10 text-blue-400' : 'bg-white/5 text-slate-500'} uppercase whitespace-nowrap">${o.status}</span>
                    </div>`);
            }).join('');
        }

        async function apiRequest(endpoint, body, successMsg) {
            try { tg.MainButton.setText(t('processing')).show(); } catch(e){}
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ ...body, user_id: APP_CONFIG.user_id, complex_id: APP_CONFIG.complex_id })
                });

                if (response.ok) {
                    try { tg.MainButton.setText(successMsg).show(); } catch(e){}
                    setTimeout(() => { closeModal(); loadData(); }, 1500);
                } else {
                    tg.showAlert("Action failed.");
                    try { tg.MainButton.hide(); } catch(e){}
                }
            } catch (err) {
                try { tg.MainButton.hide(); } catch(e){}
                tg.showAlert(t('error_conn'));
            }
        }

        // --- ДЕЙСТВИЯ (ACTIONS) ---
        const Actions = {
            order: () => {
                const description = safeGetValue('order-desc'), apt = safeGetValue('order-apt');
                if(!description || !apt) return tg.showAlert(t('error_fields'));
                apiRequest(ENDPOINTS.order, { category: safeGetValue('order-cat'), description, apt }, t('order_sent'));
            },
            broadcast: () => {
                const message = safeGetValue('broadcast-msg');
                if(!message) return tg.showAlert(t('error_fields'));
                apiRequest(ENDPOINTS.broadcast, { message }, t('success'));
            },
            remind: () => {
                const debtors = (cachedData?.all_debtors || []).filter(d => parseFloat(String(d.Total_Debt || "0").replace(',', '.')) > 0);
                if (!debtors.length) return tg.showAlert(t('no_debtors'));
                apiRequest(ENDPOINTS.remind, { debtors }, t('success'));
            },
            report: () => apiRequest(ENDPOINTS.report, {}, t('success')),
            profile: () => apiRequest(ENDPOINTS.update, { whatsapp: safeGetValue('whatsapp-input'), email: safeGetValue('email-input') }, t('success'))
        };

        const openChecklist = () => window.location.href = `checklist.html?user_id=${APP_CONFIG.user_id}&complex_id=${APP_CONFIG.complex_id}`;

        // --- ШАБЛОНЫ МОДАЛЬНЫХ ОКОН ---
        const ModalTemplates = {
            'create-order': () => {
                const opts = (cachedData?.services?.length ? cachedData.services : ['Other']).map(s => `<option value="${s}">${s}</option>`).join('');
                const apt = Array.isArray(cachedData?.apt) ? cachedData.apt[0] : String(cachedData?.apt || "").split(',')[0].trim();
                return UI.title(t('new_request_title')) +
                       `<div>${UI.label(t('category'))}<select id="order-cat" class="text-sm mb-4">${opts}</select></div>` +
                       `<div>${UI.label(t('object'))}${UI.input('order-apt', '', apt)}</div>` +
                       `<div>${UI.label(t('description'))}${UI.textarea('order-desc', t('desc_placeholder'))}</div>` +
                       UI.btn('Actions.order()', t('send_request'));
            },
            'notifications': () => UI.title(t('system_notif')) + UI.textarea('broadcast-msg', t('notif_placeholder')) + UI.btn('Actions.broadcast()', t('send_all')),
            'payment-reminders': () => UI.title(t('pay_remind_title')) + `<p class="text-[11px] text-slate-300 mb-6">${t('pay_remind_desc')}</p>` +
                                       UI.card(`"${t('pay_remind_template')}"`, 'mb-6 italic text-[10px] text-slate-400 p-4') + UI.btn('Actions.remind()', t('send_reminders')),
            'pdf-report-confirm': () => UI.title(t('pdf_title')) + `<p class="text-[11px] text-slate-300 mb-6">${t('pdf_desc')}</p>` + UI.btn('Actions.report()', t('gen_send')),
            'debtors': () => {
                const debts = (cachedData?.all_debtors || []).filter(d => parseFloat(String(d.Total_Debt || "0").replace(',', '.')) > 0);
                if (!debts.length) return UI.title(t('debtors_list')) + `<p class="text-center text-slate-500 py-10 uppercase text-[9px] font-black tracking-widest">${t('no_debtors')}</p>`;
                const cur = cachedData?.finance?.currency || '€';
                return UI.title(t('debtors_list')) + `<div class="space-y-2">` + debts.map(d => UI.card(`
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col"><p class="text-[8px] uppercase font-black text-slate-500 mb-1">${t('apartment')}</p><span class="text-sm font-bold text-slate-200">${d.Apartment || d.apt || '--'}</span></div>
                        <div class="text-right"><p class="text-[8px] uppercase font-black text-slate-500 mb-1">${t('total')}</p><span class="text-sm font-black text-red-400">${d.Total_Debt} ${cur}</span></div>
                    </div>`)).join('') + `</div>`;
            },
            'in-progress': () => UI.title(t('in_progress')) + `<div class="space-y-1">${getTasksHtml()}</div>`,
            'emergency': () => UI.title(t('emergency'), 'text-red-500') + (cachedData?.emergency || []).map(e => `
                <div class="flex justify-between items-center p-2 bg-red-500/10 border border-red-500/20 rounded-3xl mb-3">
                    <span class="text-red-400 font-bold text-sm ml-2">${e.Name}</span>
                    <a href="tel:${String(e.Phone).replace(/\s/g, '')}" class="bg-red-500 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase active:bg-red-600">${e.Phone}</a>
                </div>`).join(''),
            'uk': () => UI.title(t('management')) + (cachedData?.management || []).map(m => {
                const val = String(m.Value || "").trim(), valL = val.toLowerCase();
                const isEmail = valL.includes('@'), isPhone = /^\+?\d/.test(valL);
                const url = isEmail ? `mailto:${val}` : (isPhone ? `tel:${val.replace(/\s/g, '')}` : `https://t.me/${val.replace('@','')}`);
                const btnTxt = isEmail ? 'Email' : (isPhone ? 'Call' : 'Chat');
                const btnCol = isEmail ? 'bg-slate-600' : (isPhone ? 'bg-green-600' : 'bg-[#0088cc]');
                return UI.card(`
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col ml-2"><p class="text-[8px] uppercase font-black text-slate-500">${m.Type}</p><span class="font-bold text-sm text-white">${val}</span></div>
                        <button onclick="${url.startsWith('http') ? `tg.openLink('${url}')` : `window.location.href='${url}'`}" class="${btnCol} text-white text-[9px] font-black px-4 py-2 rounded-xl uppercase active:opacity-50">${btnTxt}</button>
                    </div>`, 'p-2 mb-3 rounded-3xl');
            }).join(''),
            'support': () => UI.title(t('support')) + `
                <button onclick="tg.openLink('https://docs.google.com/document/d/1jg6xLSmwJpXoUuiU0Mf5Cj6mZ4U7YDTWTmbsTpwi4_0/edit?usp=sharing')" class="action-btn-secondary">
                    <span class="btn-label-base text-slate-300">Privacy Policy</span><span class="text-slate-500">📄</span>
                </button>`,
            'edit-profile': () => UI.title(t('edit_profile'), 'text-white') +
                                  UI.input('whatsapp-input', 'WhatsApp', cachedData?.whatsapp || '') +
                                  UI.input('email-input', 'Email', cachedData?.email || '', 'email', 'mb-4') +
                                  UI.btn('Actions.profile()', t('save_changes'))
        };

        function openModal(type) {
            const modalBody = document.getElementById('modal-body');
            if (modalBody) {
                modalBody.innerHTML = ModalTemplates[type] ? ModalTemplates[type]() : `<p class="text-center text-slate-500 py-10">Empty</p>`;
            }
            const overlay = document.getElementById('modal-overlay');
            if (overlay) overlay.style.display = 'flex';
        }

        function closeModal() { 
            const overlay = document.getElementById('modal-overlay');
            if (overlay) overlay.style.display = 'none'; 
            try { tg.MainButton.hide(); } catch(e){}
        }
        
        // Запускаем загрузку данных только после полной загрузки DOM
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
