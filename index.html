<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        #modal-overlay {
            background: rgba(15, 17, 26, 0.85);
            backdrop-filter: blur(10px);
            display: none;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .finance-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
        }
        .finance-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-28">

    <div id="app" class="max-w-md mx-auto p-5">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-[#0088cc] font-mono">
                Lume<sup class="text-xs ml-0.5 font-normal">©</sup>
            </h1>
            <div id="status-label" class="bg-blue-500/10 px-3 py-1 rounded-full text-[10px] text-blue-400 font-bold uppercase tracking-widest border border-blue-500/20">
                Загрузка...
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p id="user-greeting" class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Welcome!</p>
                    <h2 id="complex-display-name" class="text-xl font-bold italic">--</h2>
                    <p id="city-name" class="text-slate-500 text-xs mt-1">Апартаменты: <span id="apt-numbers">--</span></p>
                </div>
                <div class="text-right">
                    <span id="temp" class="text-4xl font-light tracking-tighter text-white">--°</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/5 text-slate-400">
                <div class="flex items-center text-xs">
                    <span class="mr-2">💧</span> <span id="humidity">--%</span>
                </div>
                <div class="flex items-center text-xs">
                    <span class="mr-2">🕒</span> <span id="weather-time">--:--</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
            <div class="mb-4">
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Состояние счета</p>
                <h3 class="text-2xl font-black text-white"><span id="total-debt">0.00</span> <span class="currency">€</span></h3>
            </div>
            
            <div class="space-y-1">
                <div class="finance-item flex justify-between items-center text-sm">
                    <span class="text-slate-400">Обслуживание (Maintenance)</span>
                    <span class="font-bold text-slate-200"><span id="debt-maintenance">0.00</span> <span class="currency">€</span></span>
                </div>
                <div class="finance-item flex justify-between items-center text-sm">
                    <span class="text-slate-400">Вода / Электричество</span>
                    <span class="font-bold text-slate-200"><span id="debt-water">0.00</span> <span class="currency">€</span></span>
                </div>
                <div class="finance-item flex justify-between items-center text-sm">
                    <span class="text-slate-400">Гараж</span>
                    <span class="font-bold text-slate-200"><span id="debt-garage">0.00</span> <span class="currency">€</span></span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
            <div class="space-y-3">
                <button onclick="openModal('emergency')" class="w-full flex items-center bg-red-500/5 border border-red-500/10 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">⚠️</span>
                    <span class="text-sm font-bold text-red-400 uppercase tracking-tight">Экстренные телефоны</span>
                </button>

                <button onclick="openModal('uk')" class="w-full flex items-center bg-white/5 border border-white/5 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">📱</span>
                    <span class="text-sm font-bold text-slate-200 uppercase tracking-tight">Управляющая компания</span>
                </button>

                <button onclick="openModal('support')" class="w-full flex items-center bg-white/5 border border-white/5 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">✉️</span>
                    <span class="text-sm font-bold text-slate-200 uppercase tracking-tight">Поддержка</span>
                </button>
            </div>
        </div>

        <div id="admin-block" class="hidden">
            <button class="glass-card w-full rounded-[2rem] p-5 flex items-center justify-between border-blue-500/20 active:scale-[0.97] transition-all">
                <div class="flex items-center">
                    <span class="text-xl mr-4">🔑</span>
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest">Admin Panel</span>
                </div>
                <span class="text-slate-600">→</span>
            </button>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6" onclick="closeModal()">
        <div class="modal-content w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl" onclick="event.stopPropagation()">
            <div id="modal-body" class="text-center"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-3 rounded-xl bg-white/10 text-xs font-bold uppercase tracking-widest text-slate-400">Закрыть</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/90 backdrop-blur-xl border-t border-white/5 px-12 py-6 flex justify-between items-center z-50">
        <button class="flex flex-col items-center text-blue-500">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Home</span>
        </button>
        <button class="flex flex-col items-center text-slate-700">
            <span class="text-xl">📋</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Tasks</span>
        </button>
        <button class="flex flex-col items-center text-slate-700">
            <span class="text-xl">👤</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Базовый URL вашего API (используем тот, что был в коде)
        const API_URL = "https://sinuate-inez-proempire.ngrok-free.dev/api/data";

        let dynamicContacts = {
            tg: "https://t.me/manager_lume",
            email: "support@lume.me"
        };

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            // Получаем user_id из Telegram или используем тестовый из вашего примера
            const user_id = tg.initDataUnsafe?.user?.id || "6642689395"; 

            if (!complex_id) {
                document.getElementById('status-label').innerText = "Error: No ID";
                return;
            }

            try {
                const response = await fetch(`${API_URL}?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                
                if (!response.ok) throw new Error('Ошибка сети');
                
                const data = await response.json();
                
                // Заполнение текстовых полей
                document.getElementById('user-greeting').innerText = `Привет, ${data.user_name || 'сосед'}!`;
                document.getElementById('complex-display-name').innerText = data.complex_name || "LUME";
                document.getElementById('apt-numbers').innerText = data.apt || "--";
                
                // Погода
                document.getElementById('temp').innerText = (data.weather.temp || "--");
                document.getElementById('humidity').innerText = (data.weather.hum || "--");
                document.getElementById('weather-time').innerText = (data.weather.time ? data.weather.time.split(' ')[1] : "--:--");
                
                // Финансы
                document.getElementById('total-debt').innerText = data.finance.total;
                document.getElementById('debt-maintenance').innerText = data.finance.maintenance;
                document.getElementById('debt-water').innerText = data.finance.water;
                document.getElementById('debt-garage').innerText = data.finance.garage;
                
                // Валюта
                const currencyElements = document.getElementsByClassName('currency');
                for (let el of currencyElements) {
                    el.innerText = data.finance.currency || "€";
                }

                // Контакты
                dynamicContacts.tg = data.contacts?.tg_link || dynamicContacts.tg;
                dynamicContacts.email = data.contacts?.email || dynamicContacts.email;

                document.getElementById('status-label').innerText = "Live";
                document.getElementById('status-label').classList.replace('text-blue-400', 'text-green-400');

                // Проверка роли для админки
                if (data.role === 'staff' || data.role === 'director' || data.role === 'engineer') {
                    document.getElementById('admin-block').classList.remove('hidden');
                }

            } catch (err) { 
                console.error(err);
                document.getElementById('status-label').innerText = "Offline";
                document.getElementById('status-label').classList.replace('text-blue-400', 'text-red-400');
            }
        }

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let html = "";

            if (type === 'emergency') {
                html = `<h2 class="text-xl font-bold mb-4">🚨 Службы</h2>
                        <div class="space-y-3">
                            <a href="tel:122" class="block p-4 bg-red-500/10 rounded-2xl text-red-400 font-bold italic">Полиция (122)</a>
                            <a href="tel:124" class="block p-4 bg-red-500/10 rounded-2xl text-red-400 font-bold italic">Скорая (124)</a>
                        </div>`;
            } else if (type === 'uk') {
                html = `<h2 class="text-xl font-bold mb-4">🏢 Менеджер</h2>
                        <p class="text-xs text-slate-400 mb-4">Свяжитесь с нами по вопросам ЖК</p>
                        <a href="${dynamicContacts.tg}" target="_blank" class="block p-4 bg-blue-500 rounded-2xl text-white font-bold">Написать в Telegram</a>`;
            } else if (type === 'support') {
                html = `<h2 class="text-xl font-bold mb-4">✉️ Поддержка</h2>
                        <p class="text-xs text-slate-400 mb-4">Технические вопросы по приложению</p>
                        <a href="mailto:${dynamicContacts.email}" class="block p-4 bg-white/5 border border-white/10 rounded-2xl text-white font-bold italic">Отправить Email</a>`;
            }

            body.innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
        }

        // Запуск загрузки
        loadData();
    </script>
</body>
</html>
