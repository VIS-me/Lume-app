<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Management</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333;
            --accent: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0 0 80px 0;
            overflow-x: hidden;
        }

        /* Layout */
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }
        .card-title { font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; }
        .stat-value { display: block; font-size: 1.1em; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.75em; color: #777; }

        /* Forms */
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 8px;
            border: 1px solid #ddd; border-radius: 8px; font-size: 16px;
        }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; display: flex; justify-content: space-around;
            padding: 10px 0; border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #999; font-size: 12px; text-decoration: none; flex: 1;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Admin/Engineer Blocks */
        .admin-only, .eng-only { display: none; border: 1px dashed var(--accent); padding: 10px; margin-top: 10px; }
        
        /* Weather & Status */
        .weather-info { font-size: 0.9em; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 0.8em; font-weight: 600; }
        .status-online { background: #e3f9e5; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <!-- HOME SECTION -->
    <section id="home" class="section active">
        <div class="card">
            <div class="weather-info" id="weather-box">
                <span><i class="fas fa-location-dot"></i> Будва, Бечичи</span>
                <span id="temp-val">--°C</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-wallet text-accent"></i> Мой баланс</div>
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-value" id="debt-maintenance">0€</span><span class="stat-label">Содержание</span></div>
                <div class="stat-item"><span class="stat-value" id="debt-water">0€</span><span class="stat-label">Вода</span></div>
                <div class="stat-item"><span class="stat-value" id="debt-electricity">0€</span><span class="stat-label">Электричество</span></div>
                <div class="stat-item"><span class="stat-value" id="debt-garage">0€</span><span class="stat-label">Гараж</span></div>
            </div>
        </div>

        <div class="card eng-only" id="eng-panel">
            <div class="card-title"><i class="fas fa-tools"></i> Панель инженера</div>
            <button class="btn-primary" onclick="window.location.href='checklist.html'"><i class="fas fa-list-check"></i> Обход объектов</button>
        </div>

        <div class="card admin-only" id="admin-panel">
            <div class="card-title"><i class="fas fa-user-shield"></i> Управление</div>
            <button onclick="toggleDebtors()" class="btn-primary">Список должников</button>
            <div id="debtors-list" style="display:none; margin-top:10px; font-size: 0.85em;"></div>
            <textarea id="broadcast-msg" placeholder="Текст рассылки жильцам..."></textarea>
            <button onclick="sendBroadcast()" class="btn-success">Отправить рассылку</button>
        </div>
    </section>

    <!-- TASKS SECTION -->
    <section id="tasks" class="section">
        <div class="card">
            <div class="card-title">Создать заявку</div>
            <select id="task-type">
                <option value="plumbing">Сантехника</option>
                <option value="electrical">Электрика</option>
                <option value="cleaning">Уборка</option>
                <option value="other">Другое</option>
            </select>
            <textarea id="task-desc" rows="3" placeholder="Опишите проблему..."></textarea>
            <button onclick="submitTask()" class="btn-primary">Отправить в работу</button>
        </div>
        <div id="my-tasks-list"></div>
    </section>

    <!-- PROFILE SECTION -->
    <section id="profile" class="section">
        <div class="card" style="text-align: center;">
            <div id="user-avatar" style="font-size: 50px; margin-bottom: 10px;"><i class="fas fa-circle-user"></i></div>
            <h2 id="user-full-name" style="margin:0;">Загрузка...</h2>
            <p id="user-role" style="color: #666; font-size: 0.9em; margin-top: 5px;">Resident</p>
        </div>
        <div class="card">
            <div class="card-title">Информация</div>
            <p><strong>Апартаменты:</strong> <span id="user-apt">--</span></p>
            <p><strong>ID:</strong> <span id="user-id">--</span></p>
            <button onclick="tg.close()" style="background:#eee; color:#333;">Закрыть приложение</button>
        </div>
    </section>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-house"></i>Главная</a>
    <a href="#" class="nav-item" onclick="showTab('tasks', this)"><i class="fas fa-list-ul"></i>Заявки</a>
    <a href="#" class="nav-item" onclick="showTab('profile', this)"><i class="fas fa-user"></i>Профиль</a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let currentUser = {
        id: tg.initDataUnsafe?.user?.id || '660601831',
        role: 'Resident',
        name: tg.initDataUnsafe?.user?.first_name || 'Пользователь'
    };

    // Функция проверки ролей (поддерживает мульти-роли)
    function hasRole(roleName) {
        return currentUser.role.toLowerCase().includes(roleName.toLowerCase());
    }

    // Инициализация данных
    async function initApp() {
        try {
            const response = await fetch(`https://script.google.com/macros/s/ВАШ_ID/exec?action=getUserData&userId=${currentUser.id}`);
            const data = await response.json();
            
            if (data) {
                currentUser = { ...currentUser, ...data };
                updateUI();
            }
        } catch (e) {
            console.error("Ошибка загрузки:", e);
            updateUI(); // Показать дефолт, если упало
        }
    }

    function updateUI() {
        // Профиль
        document.getElementById('user-full-name').innerText = currentUser.name;
        document.getElementById('user-role').innerText = currentUser.role;
        document.getElementById('user-apt').innerText = currentUser.apt || 'Не привязан';
        document.getElementById('user-id').innerText = currentUser.id;

        // Баланс
        document.getElementById('debt-maintenance').innerText = (currentUser.debt_m || 0) + '€';
        document.getElementById('debt-water').innerText = (currentUser.debt_w || 0) + '€';
        document.getElementById('debt-electricity').innerText = (currentUser.debt_e || 0) + '€';
        document.getElementById('debt-garage').innerText = (currentUser.debt_g || 0) + '€';

        // Доступ к панелям
        if (hasRole('Director')) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('eng-panel').style.display = 'block';
        } else if (hasRole('Engineer')) {
            document.getElementById('eng-panel').style.display = 'block';
        }

        fetchWeather();
    }

    function showTab(tabId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    async function fetchWeather() {
        // Упрощенный запрос погоды
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=42.28&longitude=18.84&current_weather=true');
            const data = await res.json();
            document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature) + '°C';
        } catch (e) {
            document.getElementById('temp-val').innerText = '18°C';
        }
    }

    function submitTask() {
        const type = document.getElementById('task-type').value;
        const desc = document.getElementById('task-desc').value;
        if (!desc) return alert('Опишите проблему');

        tg.sendData(JSON.stringify({
            action: 'new_task',
            type: type,
            desc: desc,
            user: currentUser.id
        }));
        
        alert('Заявка отправлена!');
        document.getElementById('task-desc').value = '';
    }

    function sendBroadcast() {
        const msg = document.getElementById('broadcast-msg').value;
        if (!msg) return alert('Введите текст');
        
        tg.sendData(JSON.stringify({
            action: 'broadcast',
            text: msg
        }));
        alert('Рассылка запущена');
        document.getElementById('broadcast-msg').value = '';
    }

    async function toggleDebtors() {
        const list = document.getElementById('debtors-list');
        if (list.style.display === 'none') {
            list.innerHTML = 'Загрузка...';
            list.style.display = 'block';
            try {
                const res = await fetch(`https://script.google.com/macros/s/ВАШ_ID/exec?action=getDebtors`);
                const data = await res.json();
                list.innerHTML = data.map(d => `<div>${d.apt}: <b>${d.total}€</b> (${d.name})</div>`).join('');
            } catch (e) { list.innerText = 'Ошибка загрузки данных.'; }
        } else {
            list.style.display = 'none';
        }
    }

    window.onload = initApp;
</script>

</body>
</html>
