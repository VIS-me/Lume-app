<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: none; /* Скрыто по умолчанию */
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-28">

    <div id="app" class="max-w-md mx-auto p-5">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-[#0088cc] font-mono tracking-tighter">
                Lume<sup class="text-[10px] ml-0.5 font-normal opacity-50">©</sup>
            </h1>
            <div class="bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20 flex items-center">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2 pulse"></span>
                <span class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Live</span>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-7 mb-5">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-blue-400 text-[16px] font-black uppercase tracking-[0.25em] mb-2">Welcome!</p>
                    <h2 id="complex-display-name" class="text-2xl font-bold italic leading-tight text-white/90">--</h2>
                    <p id="city-name" class="text-slate-500 text-xs font-medium tracking-wide mt-1 italic">Loading...</p>
                </div>
                <div class="text-right">
                    <span id="temp" class="text-5xl font-light tracking-tighter text-white">--°</span>
                </div>
            </div>
            
            <div class="flex gap-6 pt-5 border-t border-white/5 text-slate-300">
                <div class="flex items-center text-xs font-semibold">
                    <span class="text-blue-400 mr-2 opacity-70">💧</span> <span id="hum">--%</span>
                </div>
                <div class="flex items-center text-xs font-semibold">
                    <span class="text-blue-400 mr-2 opacity-70">🌬️</span> <span id="wind">-- м/с</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 space-y-2.5">
            <button onclick="openModal('emergency')" class="w-full flex items-center bg-red-500/5 border border-red-500/10 py-2.5 px-5 rounded-2xl active:scale-[0.98] transition-all">
                <span class="text-lg mr-4">⚠️</span>
                <span class="text-[11px] font-bold text-red-400 uppercase tracking-widest">Экстренные телефоны</span>
            </button>

            <button onclick="openModal('uk')" class="w-full flex items-center bg-white/5 border border-white/5 py-2.5 px-5 rounded-2xl active:scale-[0.98] transition-all">
                <span class="text-lg mr-4">📱</span>
                <span class="text-[11px] font-bold text-slate-200 uppercase tracking-widest">Управляющая компания</span>
            </button>

            <button onclick="openModal('support')" class="w-full flex items-center bg-white/5 border border-white/5 py-2.5 px-5 rounded-2xl active:scale-[0.98] transition-all">
                <span class="text-lg mr-4">✉️</span>
                <span class="text-[11px] font-bold text-slate-200 uppercase tracking-widest">Поддержка</span>
            </button>
        </div>
    </div>

    <div id="modal" class="modal-overlay flex" onclick="if(event.target == this) closeModal()">
        <div class="glass-card w-[85%] max-w-xs rounded-[2.5rem] p-8 relative">
            <button onclick="closeModal()" class="absolute top-5 right-6 text-slate-500 text-xl">✕</button>
            <div id="modal-content" class="text-center pt-2">
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/80 backdrop-blur-2xl border-t border-white/5 px-10 py-6 flex justify-between items-center z-50">
        <button class="flex flex-col items-center text-blue-500">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] mt-1.5 font-black uppercase tracking-widest">Home</span>
        </button>
        <button class="flex flex-col items-center text-slate-600 opacity-40">
            <span class="text-xl">📋</span>
            <span class="text-[9px] mt-1.5 font-black uppercase tracking-widest">Tasks</span>
        </button>
        <button class="flex flex-col items-center text-slate-600 opacity-40">
            <span class="text-xl">👤</span>
            <span class="text-[9px] mt-1.5 font-black uppercase tracking-widest">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_URL = "https://7247-46-33-35-132.ngrok-free.app/api/data";
        let cachedData = null;

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            const user_id = tg.initDataUnsafe?.user?.id || "6642689395"; 

            try {
                const response = await fetch(`${API_URL}?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                cachedData = data;
                
                // Исправлено: добавлена проверка через ?. чтобы не ломать скрипт
                document.getElementById('complex-display-name').innerText = data.complex_name || "Lume Residence";
                document.getElementById('city-name').innerText = data.weather?.city || "Unknown City";
                document.getElementById('temp').innerText = (data.weather?.temp || "--") + "°";
                document.getElementById('hum').innerText = (data.weather?.hum || "--") + "%";
                document.getElementById('wind').innerText = (data.weather?.wind || "--") + " м/с";
                
            } catch (err) { 
                console.error(err);
                document.getElementById('city-name').innerText = "Offline Mode";
            }
        }

        function openModal(type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';

            if (type === 'emergency') {
                content.innerHTML = `
                    <h3 class="text-red-400 font-bold mb-5 uppercase tracking-widest text-xs">Emergency</h3>
                    <div class="space-y-4 text-sm font-medium">
                        <div class="flex justify-between border-b border-white/5 pb-2"><span>Полиция</span> <a href="tel:122" class="text-blue-400">122</a></div>
                        <div class="flex justify-between border-b border-white/5 pb-2"><span>Пожарные</span> <a href="tel:123" class="text-blue-400">123</a></div>
                        <div class="flex justify-between"><span>Скорая</span> <a href="tel:124" class="text-blue-400">124</a></div>
                    </div>
                `;
            } else if (type === 'uk') {
                const tgLink = cachedData?.contacts?.tg_link || "#";
                content.innerHTML = `
                    <h3 class="text-blue-400 font-bold mb-4 uppercase tracking-widest text-xs">Management</h3>
                    <p class="text-slate-400 text-[11px] mb-6 leading-relaxed font-medium">Свяжитесь с администрацией вашего ЖК напрямую через Telegram</p>
                    <button onclick="tg.openTelegramLink('${tgLink}')" class="w-full bg-blue-500 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest">Открыть чат</button>
                `;
            } else if (type === 'support') {
                const privacyUrl = "https://docs.google.com/document/d/1t85qQ-I8-T5A_AitY7-0wM_8Uj06DoxD3kZlD4T4mUo/edit?tab=t.0";
                content.innerHTML = `
                    <h3 class="text-slate-300 font-bold mb-4 uppercase tracking-widest text-xs">Поддержка</h3>
                    <p class="text-slate-400 text-[11px] mb-6 leading-relaxed font-medium">Для ознакомления с документами нажмите на ссылку:</p>
                    <div class="py-2">
                        <a href="javascript:void(0)" onclick="tg.openLink('${privacyUrl}')" class="text-blue-400 underline font-bold text-sm tracking-tight">Политика конфиденциальности</a>
                    </div>
                `;
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        loadData();
    </script>
</body>
</html>
