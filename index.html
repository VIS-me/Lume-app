<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-28">
    <div id="app" class="max-w-md mx-auto p-5">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-[#0088cc] font-mono tracking-tighter">Lume<sup class="text-[10px] ml-0.5 font-normal opacity-50">©</sup></h1>
            <div class="bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20 flex items-center">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2 pulse"></span>
                <span class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Live</span>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-7 mb-5">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-blue-400 text-[16px] font-black uppercase tracking-[0.25em] mb-2">Welcome!</p>
                    <h2 id="user-name-display" class="text-2xl font-bold italic leading-tight text-white/90">--</h2>
                    <p id="city-name" class="text-slate-500 text-xs font-medium tracking-wide mt-1 italic">Loading...</p>
                </div>
                <div class="text-right">
                    <span id="temp" class="text-5xl font-light tracking-tighter text-white">--°</span>
                </div>
            </div>
            <div class="flex gap-6 pt-5 border-t border-white/5 text-slate-300">
                <div class="flex items-center text-xs font-semibold">
                    <span class="text-blue-400 mr-2 opacity-70">💧</span> <span id="hum">--%</span>
                </div>
                <div class="flex items-center text-xs font-semibold">
                    <span class="text-blue-400 mr-2 opacity-70">🌬️</span> <span id="wind">-- м/с</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 space-y-2.5">
            <button onclick="openModal('emergency')" class="w-full flex items-center bg-red-500/5 border border-red-500/10 py-2.5 px-5 rounded-2xl active:scale-[0.98] transition-all">
                <span class="text-lg mr-4">⚠️</span>
                <span class="text-[11px] font-bold text-red-400 uppercase tracking-widest">Экстренные телефоны</span>
            </button>
            <button onclick="openModal('uk')" class="w-full flex items-center bg-white/5 border border-white/5 py-2.5 px-5 rounded-2xl active:scale-[0.98] transition-all">
                <span class="text-lg mr-4">📱</span>
                <span class="text-[11px] font-bold text-slate-200 uppercase tracking-widest">Управляющая компания</span>
            </button>
            <button onclick="openModal('support')" class="w-full flex items-center bg-white/5 border border-white/5 py-2.5 px-5 rounded-2xl active:scale-[0.98] transition-all">
                <span class="text-lg mr-4">✉️</span>
                <span class="text-[11px] font-bold text-slate-200 uppercase tracking-widest">Поддержка</span>
            </button>
        </div>
    </div>

    <div id="modal" class="modal-overlay flex" onclick="if(event.target == this) closeModal()">
        <div class="glass-card w-[85%] max-w-xs rounded-[2.5rem] p-8 relative">
            <button onclick="closeModal()" class="absolute top-5 right-6 text-slate-500 text-xl">✕</button>
            <div id="modal-content" class="text-center pt-2"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_URL = "https://7247-46-33-35-132.ngrok-free.app/api/data";
        let cachedData = null;

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            const user_id = urlParams.get('user_id') || tg.initDataUnsafe?.user?.id;

            try {
                const response = await fetch(`${API_URL}?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                cachedData = data;

                // Заполняем данными из Python (которые пришли из Google Таблиц)
                document.getElementById('user-name-display').innerText = data.user_name || "Guest";
                document.getElementById('city-name').innerText = data.weather?.city || "Unknown City";
                document.getElementById('temp').innerText = (data.weather?.temp || "--") + "°";
                document.getElementById('hum').innerText = (data.weather?.hum || "--") + "%";
                document.getElementById('wind').innerText = (data.weather?.wind || "--") + " м/с";
                
            } catch (err) {
                console.error("Ошибка загрузки:", err);
                document.getElementById('city-name').innerText = "Offline Mode";
            }
        }

        function openModal(type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';

            if (type === 'emergency') {
                // Берем список экстренных телефонов из таблицы Contacts
                const emergencyHTML = cachedData?.contacts?.emergency?.length > 0 
                    ? cachedData.contacts.emergency.map(item => `
                        <div class="flex justify-between border-b border-white/5 pb-2">
                            <span>${item.name}</span>
                            <a href="tel:${item.phone}" class="text-blue-400 font-bold">${item.phone}</a>
                        </div>
                    `).join('')
                    : `<p class="text-slate-500 text-xs">Нет данных в таблице Contacts</p>`;

                content.innerHTML = `
                    <h3 class="text-red-400 font-bold mb-5 uppercase tracking-widest text-xs">Emergency</h3>
                    <div class="space-y-4 text-sm font-medium">${emergencyHTML}</div>
                `;
            } else if (type === 'uk') {
                const tgLink = cachedData?.contacts?.tg_link || "#";
                content.innerHTML = `
                    <h3 class="text-blue-400 font-bold mb-4 uppercase tracking-widest text-xs">Management</h3>
                    <p class="text-slate-400 text-[11px] mb-6 leading-relaxed font-medium">Свяжитесь с администрацией ЖК в Telegram</p>
                    <button onclick="tg.openTelegramLink('${tgLink}')" class="w-full bg-blue-500 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest">Открыть чат</button>
                `;
            } else if (type === 'support') {
                content.innerHTML = `
                    <h3 class="text-slate-300 font-bold mb-4 uppercase tracking-widest text-xs">Поддержка</h3>
                    <p class="text-slate-400 text-[11px] mb-6 leading-relaxed font-medium">Связь по Email:</p>
                    <a href="mailto:${cachedData?.contacts?.email}" class="text-blue-400 font-bold underline text-sm">${cachedData?.contacts?.email}</a>
                `;
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        loadData();
    </script>
</body>
