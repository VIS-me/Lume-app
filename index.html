<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        #modal-overlay {
            background: rgba(15, 17, 26, 0.85);
            backdrop-filter: blur(10px);
            display: none;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Анимация нажатия */
        .active-scale:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-28">

    <div id="app" class="max-w-md mx-auto p-5">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-[#0088cc] font-mono">
                LUME<sup class="text-xs ml-0.5 font-normal">©</sup>
            </h1>
            <div id="status-label" class="bg-blue-500/10 px-3 py-1 rounded-full text-[10px] text-blue-400 font-bold uppercase tracking-widest border border-blue-500/20">
                Загрузка...
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Welcome, <span id="user-display-name">User</span>!</p>
                    <h2 id="complex-display-name" class="text-xl font-bold italic">--</h2>
                    <p id="city-name" class="text-slate-500 text-xs mt-1">--</p>
                    <p class="text-[10px] text-slate-600 mt-1 uppercase font-bold tracking-tighter">Apt: <span id="apt-number">--</span></p>
                </div>
                <div class="text-right">
                    <span id="temp" class="text-4xl font-light tracking-tighter text-white">--°</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/5 text-slate-400">
                <div class="flex items-center text-xs">
                    <span class="mr-2">💧</span> <span id="humidity">--%</span>
                </div>
                <div class="flex items-center text-xs">
                    <span class="mr-2">🌬️</span> <span id="wind">-- м/с</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
             <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2 opacity-70">Финансы</p>
             <div class="flex justify-between items-end">
                 <div>
                    <h3 class="text-3xl font-bold" id="total-debt">0.00 €</h3>
                    <p class="text-[10px] text-slate-500 uppercase font-medium">Общая задолженность</p>
                 </div>
                 <button class="bg-blue-500/20 text-blue-400 text-[10px] px-4 py-2 rounded-xl font-black uppercase tracking-widest border border-blue-500/20 active-scale">Оплатить</button>
             </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
            <div class="space-y-3">
                <button onclick="openModal('emergency')" class="w-full flex items-center bg-red-500/5 border border-red-500/10 p-4 rounded-2xl active-scale transition-all">
                    <span class="text-xl mr-4">⚠️</span>
                    <span class="text-sm font-bold text-red-400 uppercase tracking-tight">Экстренные службы</span>
                </button>

                <button onclick="openModal('uk')" class="w-full flex items-center bg-white/5 border border-white/5 p-4 rounded-2xl active-scale transition-all">
                    <span class="text-xl mr-4">🏢</span>
                    <span class="text-sm font-bold text-slate-200 uppercase tracking-tight">Управляющая компания</span>
                </button>

                <button onclick="openModal('support')" class="w-full flex items-center bg-white/5 border border-white/5 p-4 rounded-2xl active-scale transition-all">
                    <span class="text-xl mr-4">✉️</span>
                    <span class="text-sm font-bold text-slate-200 uppercase tracking-tight">Поддержка LUME</span>
                </button>
            </div>
        </div>

        <div id="admin-block" class="hidden">
            <button class="glass-card w-full rounded-[2rem] p-5 flex items-center justify-between border-blue-500/20 active-scale transition-all">
                <div class="flex items-center">
                    <span class="text-xl mr-4">🔑</span>
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest">Admin Panel</span>
                </div>
                <span class="text-slate-600">→</span>
            </button>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6" onclick="closeModal()">
        <div class="modal-content w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl" onclick="event.stopPropagation()">
            <div id="modal-body" class="text-center"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-3 rounded-xl bg-white/10 text-xs font-bold uppercase tracking-widest text-slate-400">Закрыть</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/90 backdrop-blur-xl border-t border-white/5 px-12 py-6 flex justify-between items-center z-50">
        <button class="flex flex-col items-center text-blue-500">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Home</span>
        </button>
        <button class="flex flex-col items-center text-slate-700">
            <span class="text-xl">📋</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Tasks</span>
        </button>
        <button class="flex flex-col items-center text-slate-700">
            <span class="text-xl">👤</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Ссылка на ваш API (проверьте, чтобы она совпадала с ngrok в боте)
        const API_URL = "https://sinuate-inez-proempire.ngrok-free.dev/api/data";

        let appData = null; // Глобальное хранилище данных

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            const user_id = tg.initDataUnsafe?.user?.id || "6642689395"; 

            try {
                const response = await fetch(`${API_URL}?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                appData = data; // Сохраняем данные для модальных окон
                
                // Наполнение данными
                document.getElementById('user-display-name').innerText = data.user_name || "User";
                document.getElementById('complex-display-name').innerText = data.complex_name || "LUME";
                document.getElementById('apt-number').innerText = data.apt || "--";
                
                // Погода
                document.getElementById('city-name').innerText = data.complex_name || "Location";
                document.getElementById('temp').innerText = (data.weather.temp || "--");
                document.getElementById('humidity').innerText = (data.weather.hum || "--");
                document.getElementById('wind').innerText = (data.weather.wind || "--");
                
                // Финансы
                document.getElementById('total-debt').innerText = `${data.finance.total} ${data.finance.currency}`;

                // Роли (Admin Panel)
                const adminRoles = ['director', 'engineer', 'staff'];
                if (adminRoles.includes(data.role)) {
                    document.getElementById('admin-block').classList.remove('hidden');
                }

                document.getElementById('status-label').innerText = "Live";
                document.getElementById('status-label').className = "bg-green-500/10 px-3 py-1 rounded-full text-[10px] text-green-400 font-bold uppercase tracking-widest border border-green-500/20";

            } catch (err) { 
                console.error(err);
                document.getElementById('status-label').innerText = "Offline";
                document.getElementById('status-label').className = "bg-red-500/10 px-3 py-1 rounded-full text-[10px] text-red-400 font-bold uppercase tracking-widest border border-red-500/20";
            }
        }

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let html = "";

            if (!appData) {
                body.innerHTML = "<p>Загрузка данных...</p>";
                return;
            }

            if (type === 'emergency') {
                html = `<h2 class="text-xl font-bold mb-4">🚨 Службы</h2><div class="space-y-3">`;
                
                if (appData.contacts.emergency && appData.contacts.emergency.length > 0) {
                    appData.contacts.emergency.forEach(service => {
                        html += `
                            <a href="tel:${service.Phone}" class="flex justify-between items-center p-4 bg-red-500/10 rounded-2xl border border-red-500/20 active-scale">
                                <span class="text-red-100 font-bold text-sm">${service.Name}</span>
                                <span class="text-red-400 font-mono">${service.Phone}</span>
                            </a>`;
                    });
                } else {
                    html += `<p class="text-slate-500">Контакты не найдены</p>`;
                }
                html += `</div>`;

            } else if (type === 'uk') {
                html = `
                    <h2 class="text-xl font-bold mb-4">🏢 Управляющая</h2>
                    <div class="space-y-3">
                        <a href="${appData.contacts.tg_link}" class="block p-4 bg-[#0088cc] rounded-2xl text-white font-bold active-scale">Написать Менеджеру</a>
                        <p class="text-[10px] text-slate-500 uppercase italic">Ответ в течение 15 минут</p>
                    </div>`;

            } else if (type === 'support') {
                html = `
                    <h2 class="text-xl font-bold mb-4">✉️ Поддержка</h2>
                    <div class="space-y-3">
                        <a href="mailto:${appData.contacts.email}" class="block p-4 bg-white/5 border border-white/10 rounded-2xl text-white font-bold italic active-scale">Email Support</a>
                        <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Технические вопросы по работе бота</p>
                    </div>`;
            }

            body.innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
        }

        // Запуск при загрузке
        loadData();
    </script>
</body>
</html>
