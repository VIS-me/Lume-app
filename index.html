<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        #modal-overlay {
            background: rgba(15, 17, 26, 0.92);
            backdrop-filter: blur(10px);
            display: none;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .finance-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
        }
        .finance-item:last-child { border-bottom: none; }
        
        /* Анимация переключения экранов */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-btn.active { color: #3b82f6; }
        .nav-btn.active span:first-child { transform: scale(1.1); transition: 0.2s; }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-28">

    <div id="app" class="max-w-md mx-auto p-5">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-[#0088cc] font-mono">
                Lume<sup class="text-xs ml-0.5 font-normal">©</sup>
            </h1>
            <div id="status-label" class="bg-blue-500/10 px-3 py-1 rounded-full text-[10px] text-blue-400 font-bold uppercase tracking-widest border border-blue-500/20">
                Загрузка...
            </div>
        </div>

        <div id="page-home" class="page active">
            <div class="glass-card rounded-[2.5rem] p-6 mb-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p id="user-greeting" class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Welcome!</p>
                        <h2 id="complex-display-name" class="text-xl font-bold italic">--</h2>
                        <p class="text-slate-500 text-xs mt-1">Апартаменты: <span id="apt-numbers">--</span></p>
                    </div>
                    <div class="text-right">
                        <span id="temp" class="text-4xl font-light tracking-tighter text-white">--°</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 pt-4 border-t border-white/5 text-slate-400">
                    <div class="flex items-center text-[10px]">
                        <span class="mr-1">💧</span> <span id="humidity">--%</span>
                    </div>
                    <div class="flex items-center text-[10px]">
                        <span class="mr-1">💨</span> <span id="wind">-- m/s</span>
                    </div>
                    <div class="flex items-center text-[10px] justify-end">
                        <span class="mr-1">🕒</span> <span id="weather-time">--:--</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <button onclick="openModal('emergency')" class="flex items-center bg-red-500/5 border border-red-500/10 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">🚨</span>
                    <span class="text-sm font-bold text-red-400 uppercase tracking-tight">Экстренные службы</span>
                </button>

                <button onclick="openModal('uk')" class="flex items-center bg-white/5 border border-white/5 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">🏢</span>
                    <span class="text-sm font-bold text-slate-200 uppercase tracking-tight">Управляющая компания</span>
                </button>

                <div id="admin-block" class="hidden mt-4">
                    <button onclick="openModal('management')" class="w-full glass-card border-blue-500/30 p-4 rounded-2xl flex items-center active:scale-[0.97] transition-all">
                        <span class="text-xl mr-4">⚙️</span>
                        <span class="text-sm font-bold text-blue-400 uppercase tracking-tight">Управление</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="page-tasks" class="page">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-xl font-bold">Мои заявки</h2>
                <button onclick="openModal('create-order')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">Создать</button>
            </div>
            
            <div class="space-y-4">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Активные</p>
                <div id="active-tasks-list" class="text-center py-8 glass-card rounded-3xl text-slate-600 text-xs italic">
                    Нет активных заявок
                </div>
                
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest pt-4">Архив</p>
                <div id="archive-tasks-list" class="text-center py-4 text-slate-700 text-xs">
                    История пуста
                </div>
            </div>
        </div>

        <div id="page-profile" class="page">
            <div class="glass-card rounded-[2.5rem] p-6 mb-6">
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-4 opacity-70 italic text-center">Финансовый отчет</p>
                <div class="text-center mb-8">
                    <h3 class="text-3xl font-black text-white"><span id="p-total-debt">0.00</span> <span class="currency">€</span></h3>
                    <p class="text-[10px] text-slate-500 uppercase mt-1">Общая задолженность</p>
                </div>
                
                <div class="space-y-1">
                    <div class="finance-item flex justify-between text-sm">
                        <span class="text-slate-400">Обслуживание</span>
                        <span class="font-bold"><span id="p-debt-maintenance">0.00</span> <span class="currency">€</span></span>
                    </div>
                    <div class="finance-item flex justify-between text-sm">
                        <span class="text-slate-400">Вода / Эл.</span>
                        <span class="font-bold"><span id="p-debt-water">0.00</span> <span class="currency">€</span></span>
                    </div>
                    <div class="finance-item flex justify-between text-sm">
                        <span class="text-slate-400">Гараж</span>
                        <span class="font-bold"><span id="p-debt-garage">0.00</span> <span class="currency">€</span></span>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-6">
                 <button onclick="openModal('support')" class="w-full flex justify-between items-center text-sm font-bold">
                    <span>✉️ Поддержка приложения</span>
                    <span class="text-slate-600">→</span>
                 </button>
            </div>
        </div>

    </div>

    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-end justify-center" onclick="closeModal()">
        <div class="modal-content w-full rounded-t-[3rem] p-8 pb-12 shadow-2xl translate-y-0 transition-transform" onclick="event.stopPropagation()">
            <div id="modal-body"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 rounded-2xl bg-white/5 text-[10px] font-black uppercase tracking-widest text-slate-500">Назад</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/95 backdrop-blur-2xl border-t border-white/5 px-10 py-6 flex justify-between items-center z-50">
        <button onclick="switchPage('home')" id="nav-home" class="nav-btn flex flex-col items-center active">
            <span class="text-xl">🏠</span>
            <span class="text-[8px] mt-1 font-black uppercase">Home</span>
        </button>
        <button onclick="switchPage('tasks')" id="nav-tasks" class="nav-btn flex flex-col items-center text-slate-700">
            <span class="text-xl">📋</span>
            <span class="text-[8px] mt-1 font-black uppercase">Tasks</span>
        </button>
        <button onclick="switchPage('profile')" id="nav-profile" class="nav-btn flex flex-col items-center text-slate-700">
            <span class="text-xl">👤</span>
            <span class="text-[8px] mt-1 font-black uppercase">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_URL = "https://sinuate-inez-proempire.ngrok-free.dev/api/data";
        let cachedData = null;

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-blue-500', 'active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-slate-700'));

            document.getElementById('page-' + pageId).classList.add('active');
            const activeBtn = document.getElementById('nav-' + pageId);
            activeBtn.classList.add('text-blue-500', 'active');
            activeBtn.classList.remove('text-slate-700');
        }

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            const user_id = tg.initDataUnsafe?.user?.id || "6642689395"; 

            try {
                const response = await fetch(`${API_URL}?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                cachedData = data;
                
                // Главная
                document.getElementById('user-greeting').innerText = `Hello, ${data.user_name}!`;
                document.getElementById('complex-display-name').innerText = data.complex_name;
                document.getElementById('apt-numbers').innerText = data.apt || "--";
                document.getElementById('temp').innerText = data.weather.temp;
                document.getElementById('humidity').innerText = data.weather.hum;
                document.getElementById('wind').innerText = (data.weather.wind || "0") + " m/s";
                document.getElementById('weather-time').innerText = data.weather.time ? data.weather.time.split(' ')[1] : "--:--";
                
                // Профиль (Финансы)
                document.getElementById('p-total-debt').innerText = data.finance.total;
                document.getElementById('p-debt-maintenance').innerText = data.finance.maintenance;
                document.getElementById('p-debt-water').innerText = data.finance.water;
                document.getElementById('p-debt-garage').innerText = data.finance.garage;

                // Валюта
                document.querySelectorAll('.currency').forEach(el => el.innerText = data.finance.currency);

                // Права доступа
                const privileged = ['engineer', 'director', 'administrator', 'staff'];
                if (privileged.includes(data.role)) {
                    document.getElementById('admin-block').classList.remove('hidden');
                }

                document.getElementById('status-label').innerText = "Live";
                document.getElementById('status-label').classList.replace('text-blue-400', 'text-green-400');
            } catch (err) {
                document.getElementById('status-label').innerText = "Offline";
                document.getElementById('status-label').classList.replace('text-blue-400', 'text-red-400');
            }
        }

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let html = "";

            if (type === 'emergency') {
                html = `<h2 class="text-xl font-bold mb-6 text-center italic">🚨 Экстренные службы</h2><div class="grid grid-cols-1 gap-3">`;
                if (cachedData?.emergency) {
                    cachedData.emergency.forEach(item => {
                        html += `<a href="tel:${item.Number}" class="flex justify-between p-5 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 font-bold italic">
                            <span>${item.Service}</span><span>${item.Number}</span></a>`;
                    });
                }
                html += `</div>`;
            } 
            else if (type === 'uk') {
                const manager = cachedData?.management || {};
                html = `<div class="text-center"><h2 class="text-xl font-bold mb-2 italic">🏢 Администрация</h2>
                    <p class="text-xs text-slate-400 mb-8 font-mono">${manager.Director || 'Lume Management'}</p>
                    <a href="https://t.me/${manager.Telegram || 'manager'}" class="block p-5 bg-blue-600 rounded-2xl text-white font-black uppercase text-xs tracking-widest">Открыть чат</a>
                </div>`;
            }
            else if (type === 'create-order') {
                html = `<h2 class="text-xl font-bold mb-6 text-center italic">📝 Новая заявка</h2>
                    <select id="order-cat" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-sm text-white outline-none">
                        <option value="">Выберите категорию...</option>
                        ${cachedData?.services?.map(s => `<option value="${s}">${s}</option>`).join('')}
                    </select>
                    <textarea id="order-desc" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl h-32 mb-4 text-sm outline-none" placeholder="Опишите проблему..."></textarea>
                    <button class="w-full p-5 bg-blue-600 rounded-2xl text-white font-black uppercase text-xs">Отправить</button>`;
            }
            else if (type === 'management') {
                html = `<h2 class="text-xl font-bold mb-8 text-center italic">⚙️ Панель управления</h2>
                    <div class="space-y-3">
                        <button class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-left flex justify-between items-center">
                            <span class="text-xs font-bold uppercase">📊 Должники</span><span class="text-slate-500">→</span>
                        </button>
                        <button class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-left flex justify-between items-center">
                            <span class="text-xs font-bold uppercase">🛠 Заявки в работе</span><span class="text-slate-500">→</span>
                        </button>`;
                // Кнопка Чек-лист только для Инженера
                if (cachedData?.role === 'engineer') {
                    html += `<button class="w-full p-5 bg-blue-500/10 border border-blue-500/20 rounded-2xl text-left flex justify-between items-center">
                        <span class="text-xs font-bold uppercase text-blue-400">📋 Технический чек-лист</span><span class="text-blue-400">→</span>
                    </button>`;
                }
                html += `</div>`;
            }
            else if (type === 'support') {
                html = `<div class="text-center"><h2 class="text-xl font-bold mb-4 italic">✉️ Поддержка</h2>
                    <p class="text-xs text-slate-500 mb-8">Возникли технические проблемы? Напишите нам.</p>
                    <a href="mailto:support@lume.me" class="block p-5 bg-white/5 border border-white/10 rounded-2xl text-white font-bold italic">support@lume.me</a>
                </div>`;
            }

            body.innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        loadData();
    </script>
</body>
</html>
