<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }
        #modal-overlay {
            background: rgba(15, 17, 26, 0.98);
            display: none;
        }
        .page { display: none; }
        .page.active { display: block; }
        .nav-btn { color: #475569; transition: all 0.2s; }
        .nav-btn.active { color: #0088cc; }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 1rem;
            color: white;
            width: 100%;
            outline: none;
        }
        .finance-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
        }
        option { background: #1e293b; color: white; }
        #modal-body::-webkit-scrollbar { width: 4px; }
        #modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-24">

    <div id="app" class="max-w-md mx-auto p-6">
        
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold text-[#0088cc] italic">Lume<sup class="text-[10px] font-normal">©</sup></h1>
            <div id="status-label" class="text-[9px] font-black uppercase tracking-[0.2em] text-blue-500/50">System Live</div>
        </div>

        <!-- HOME PAGE -->
        <div id="page-home" class="page active">
            <div class="glass-card p-8 mb-6">
                <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">WELCOME!</p>
                <h2 id="complex-display-name" class="text-2xl font-bold italic mb-8">--</h2>
                <div class="flex justify-between items-end">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Hum</p>
                            <p id="humidity" class="text-lg font-bold">--%</p>
                        </div>
                        <div>
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Wind</p>
                            <p id="wind" class="text-lg font-bold">--</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span id="temp" class="text-5xl font-light tracking-tighter text-white whitespace-nowrap">--°C</span>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 space-y-3 mb-6">
                <button onclick="openModal('emergency')" class="w-full flex justify-between items-center p-2 bg-red-500/5 border border-red-500/10 rounded-[1.8rem] active:opacity-70 transition-opacity">
                    <span class="text-[10px] font-black uppercase tracking-widest text-red-500">Emergency</span>
                    <span class="text-red-500/20 text-xl">🚨</span>
                </button>
                <button onclick="openModal('uk')" class="w-full flex justify-between items-center p-2 bg-white/5 border border-white/5 rounded-[1.8rem] active:opacity-70 transition-opacity">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-300">Management</span>
                    <span class="text-slate-600 text-xl">🏢</span>
                </button>
                <button onclick="openModal('support')" class="w-full flex justify-between items-center p-2 bg-white/5 border border-white/5 rounded-[1.8rem] active:opacity-70 transition-opacity">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-300">Support</span>
                    <span class="text-slate-600 text-xl">✉️</span>
                </button>
            </div>
        </div>

        <!-- TASKS PAGE -->
        <div id="page-tasks" class="page">
            <div class="glass-card p-6 space-y-4">
                <button onclick="openModal('create-order')" class="w-full py-3 bg-blue-600/10 border border-blue-600/20 rounded-3xl flex flex-col items-center justify-center space-y-2 active:bg-blue-600/20">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Create New Request</span>
                </button>
                <button onclick="openModal('in-progress')" class="w-full py-3 bg-white/5 border border-white/10 rounded-3xl flex flex-col items-center justify-center space-y-2 active:bg-white/10">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">In Progress</span>
                </button>

                <div id="admin-block" class="hidden mt-4 space-y-3">
                    <button onclick="openModal('notifications')" class="w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">Notification</button>
                    <button onclick="openModal('finance-list')" class="w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">Debtors</button>
                    <button id="engineer-btn" onclick="openModal('checklist')" class="hidden w-full glass-card p-3 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic active:bg-blue-500/5">Checklist</button>
                </div>
            </div>
        </div>

        <!-- PROFILE PAGE -->
        <div id="page-profile" class="page">
            <div class="glass-card p-8 mb-6 text-center">
                <img id="profile-avatar" src="" alt="👤" class="w-24 h-24 rounded-full mx-auto mb-4 border border-blue-600/20 shadow-lg object-cover bg-slate-800">
                <h3 id="profile-name" class="text-2xl font-bold italic tracking-tight">--</h3>
                <p id="profile-role" class="text-[9px] text-blue-400 font-black uppercase tracking-[0.4em] mt-2">--</p>
                <p class="text-[10px] text-slate-500 mt-2 font-mono">Апартамент: <span id="apt-numbers">--</span></p>
            </div>

            <div class="glass-card p-8 cursor-pointer active:opacity-80 transition-opacity" onclick="openModal('finance-list')">
                <h4 class="text-xl font-bold italic mb-6">Финансы</h4>
                <div class="flex justify-between finance-item">
                    <span class="text-xs text-slate-500 font-medium">К оплате:</span>
                    <span class="text-xl font-black"><span id="p-total-debt">0.00</span> <span>€</span></span>
                </div>
                <p class="text-[8px] text-center text-slate-600 uppercase font-black mt-4 tracking-widest italic">Нажмите для деталей по всем объектам</p>
            </div>
        </div>
    </div>

    <!-- MODAL OVERLAY -->
    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-end justify-center" onclick="closeModal()">
        <div class="w-full bg-[#1e293b] rounded-t-[3.5rem] p-10 pb-16 shadow-2xl transition-transform duration-300" onclick="event.stopPropagation()">
            <div id="modal-body" class="max-h-[60vh] overflow-y-auto"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 rounded-2xl bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-500 active:bg-white/10">Close</button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/80 backdrop-blur-xl border-t border-white/5 px-12 py-7 flex justify-between items-center z-50">
        <button onclick="switchPage('home')" id="nav-home" class="nav-btn active flex flex-col items-center">
            <span class="text-2xl">🏠</span>
            <span class="text-[8px] mt-1 font-black uppercase">Home</span>
        </button>
        <button onclick="switchPage('tasks')" id="nav-tasks" class="nav-btn flex flex-col items-center">
            <span class="text-2xl">📋</span>
            <span class="text-[8px] mt-1 font-black uppercase">Tasks</span>
        </button>
        <button onclick="switchPage('profile')" id="nav-profile" class="nav-btn flex flex-col items-center">
            <span class="text-2xl">👤</span>
            <span class="text-[8px] mt-1 font-black uppercase">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_BASE = "https://sinuate-inez-proempire.ngrok-free.dev";
        const urlParams = new URLSearchParams(window.location.search);
        const APP_CONFIG = {
            complex_id: urlParams.get('complex_id'),
            user_id: urlParams.get('user_id') || tg.initDataUnsafe?.user?.id
        };

        let cachedData = null;
        let isStaff = false;

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        async function loadData() {
            if(tg.initDataUnsafe?.user?.photo_url) document.getElementById('profile-avatar').src = tg.initDataUnsafe.user.photo_url;
            document.getElementById('profile-name').innerText = tg.initDataUnsafe?.user?.first_name || 'Resident';

            try {
                const response = await fetch(`${API_BASE}/api/data?user_id=${APP_CONFIG.user_id}&complex_id=${APP_CONFIG.complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                cachedData = data;
                
                const role = (data.role || "").toLowerCase();
                isStaff = ['engineer', 'director', 'administrator', 'staff'].includes(role);

                document.getElementById('complex-display-name').innerText = data.complex_name || "--";
                document.getElementById('apt-numbers').innerText = Array.isArray(data.apt) ? data.apt.join(', ') : (data.apt || "--");
                document.getElementById('profile-role').innerText = data.role || "--";

                if (data.weather) {
                    document.getElementById('temp').innerText = `${data.weather.temp || 0}°C`;
                    document.getElementById('humidity').innerText = data.weather.hum || "--%";
                    document.getElementById('wind').innerText = (data.weather.wind || 0) + " m/s";
                }

                if (data.finance) {
                    if (Array.isArray(data.finance)) {
                        const myApt = String(data.apt || "");
                        const myFinance = data.finance.find(f => String(f.apt || f.Apt) === myApt);
                        document.getElementById('p-total-debt').innerText = myFinance ? (myFinance.Total_Debt || "0.00") : "0.00";
                    } else {
                        document.getElementById('p-total-debt').innerText = data.finance.Total_Debt || "0.00";
                    }
                }

                if (isStaff) {
                    document.getElementById('admin-block')?.classList.remove('hidden');
                    if (role === 'engineer') document.getElementById('engineer-btn')?.classList.remove('hidden');
                }

            } catch (err) { 
                console.error("Load Error:", err);
            }
        }

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let html = "";

            if (type === 'finance-list') {
                const financeData = cachedData?.finance;
                html = `
                    <h2 class="text-xl font-bold mb-6 italic text-blue-400">Ведомость задолженностей</h2>
                    <div class="space-y-2">
                        <div class="flex justify-between px-4 mb-2 text-[8px] font-black uppercase text-slate-500 tracking-widest">
                            <span>Апартамент</span>
                            <span>Сумма долга</span>
                        </div>
                `;

                if (Array.isArray(financeData)) {
                    financeData.forEach(item => {
                        const aptNum = item.apt || item.Apt || "N/A";
                        const debt = item.Total_Debt || item.total_debt || "0.00";
                        const isDebt = parseFloat(debt) > 0;

                        html += `
                        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                            <span class="text-sm font-bold text-slate-200">Apt: ${aptNum}</span>
                            <span class="text-sm font-black ${isDebt ? 'text-red-400' : 'text-green-400'}">${debt} €</span>
                        </div>`;
                    });
                } else {
                    html += `<p class="text-center py-10 text-slate-600 uppercase text-[10px] font-black">Данные отсутствуют</p>`;
                }
                html += `</div>`;
            }
            else if (type === 'create-order') {
                const currentApt = Array.isArray(cachedData?.apt) ? cachedData.apt[0] : (cachedData?.apt || "").split(',')[0];
                const services = cachedData?.services?.map(s => `<option value="${s}">${s}</option>`).join('') || `<option value="Other">Other</option>`;
                html = `
                    <h2 class="text-xl font-bold mb-6 italic text-blue-400">New Request</h2>
                    <div class="space-y-4">
                        <select id="order-cat" class="text-sm">${services}</select>
                        <input type="text" id="order-apt" class="text-sm" value="${currentApt}">
                        <textarea id="order-desc" class="text-sm h-32" placeholder="Describe the issue..."></textarea>
                        <button onclick="sendOrder()" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-[10px] tracking-widest mt-4">Send Request</button>
                    </div>`;
            }
            else if (type === 'in-progress') {
                html = `<h2 class="text-xl font-bold mb-6 italic text-blue-400">Active Requests</h2>`;
                if (cachedData?.active_orders?.length) {
                    cachedData.active_orders.forEach(o => {
                        html += `<div class="p-4 bg-white/5 rounded-2xl mb-2 border border-white/5 text-left">
                            <div class="flex justify-between items-start mb-1"><span class="text-[10px] font-black text-blue-400 uppercase">${o.category}</span></div>
                            <p class="text-[11px] text-slate-300">${o.desc}</p>
                        </div>`;
                    });
                } else {
                    html += `<p class="text-center py-10 text-[9px] font-black text-slate-600 uppercase">No active tasks</p>`;
                }
            }
            else if (type === 'emergency') {
                html = `<h2 class="text-xl font-bold mb-8 italic text-red-500">Emergency</h2>`;
                cachedData?.emergency?.forEach(e => {
                    html += `<div class="flex justify-between items-center p-2 bg-red-500/10 border border-red-500/20 rounded-3xl mb-3">
                        <span class="text-red-400 font-bold text-sm ml-2">${e.Name}</span>
                        <a href="tel:${String(e.Phone).replace(/\s/g, '')}" class="bg-red-500 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase">${e.Phone}</a>
                    </div>`;
                });
            }
            else if (type === 'uk') {
                html = `<h2 class="text-xl font-bold mb-6 italic text-blue-400">Management</h2>`;
                cachedData?.management?.forEach(m => {
                    html += `<div class="p-2 bg-white/5 border border-white/10 rounded-3xl mb-3 flex justify-between items-center">
                        <div class="ml-2"><p class="text-[8px] uppercase font-black text-slate-500">${m.Type}</p><span class="font-bold text-sm">${m.Value}</span></div>
                        <button onclick="window.location.href='tel:${m.Value}'" class="bg-green-600 text-white text-[9px] font-black px-4 py-2 rounded-xl uppercase">Call</button>
                    </div>`;
                });
            }

            body.innerHTML = html || `<p class="text-center text-slate-500 py-10">No data</p>`;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        async function sendOrder() {
            const category = document.getElementById('order-cat').value;
            const description = document.getElementById('order-desc').value;
            const apartment = document.getElementById('order-apt').value;
            if(!description.trim()) return tg.showAlert("Please describe the issue");
            tg.MainButton.setText("Sending...").show();
            try {
                const res = await fetch(`${API_BASE}/api/create_order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: APP_CONFIG.user_id, complex_id: APP_CONFIG.complex_id, category, description, apt: apartment })
                });
                if (res.ok) {
                    tg.MainButton.setText("Done!").show();
                    setTimeout(() => { closeModal(); loadData(); }, 1000);
                }
            } catch (e) { tg.MainButton.hide(); }
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; tg.MainButton.hide(); }
        loadData();
    </script>
</body>
</html>
