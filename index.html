<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }
        #modal-overlay {
            background: rgba(15, 17, 26, 0.98);
            display: none;
        }
        .page { display: none; }
        .page.active { display: block; }
        .nav-btn { color: #475569; transition: all 0.2s; }
        .nav-btn.active { color: #0088cc; }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 1rem;
            color: white;
            width: 100%;
            outline: none;
        }
        .finance-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
        }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-24">

    <div id="app" class="max-w-md mx-auto p-6">
        
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold text-[#0088cc] italic">Lume<sup class="text-[10px] font-normal">©</sup></h1>
            <div id="status-label" class="text-[9px] font-black uppercase tracking-[0.2em] text-blue-500/50">System Live</div>
        </div>

        <div id="page-home" class="page active">
            <div class="glass-card p-8 mb-6">
                <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">WELCOME!</p>
                <h2 id="complex-display-name" class="text-2xl font-bold italic mb-8">--</h2>
                <div class="flex justify-between items-end">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Hum</p>
                            <p id="humidity" class="text-lg font-bold">--%</p>
                        </div>
                        <div>
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Wind</p>
                            <p id="wind" class="text-lg font-bold">--</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span id="temp" class="text-6xl font-light tracking-tighter">--</span><span class="text-2xl text-blue-400">°</span>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 space-y-3">
                <button onclick="openModal('emergency')" class="w-full flex justify-between items-center p-2 bg-red-500/5 border border-red-500/10 rounded-[1.8rem]">
                    <span class="text-[10px] font-black uppercase tracking-widest text-red-500">Emergency</span>
                    <span class="text-red-500/20 text-xl">🚨</span>
                </button>
                <button onclick="openModal('uk')" class="w-full flex justify-between items-center p-2 bg-white/5 border border-white/5 rounded-[1.8rem]">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-300">Management</span>
                    <span class="text-slate-600 text-xl">🏢</span>
                </button>
                <button onclick="openModal('support')" class="w-full flex justify-between items-center p-2 bg-white/5 border border-white/5 rounded-[1.8rem]">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-300">Support</span>
                    <span class="text-slate-600 text-xl">✉️</span>
                </button>
            </div>
        </div>

        <div id="page-tasks" class="page">
            <div class="glass-card p-6 mb-6">
                <p class="text-[10px] font-black uppercase tracking-widest mb-4 text-blue-400">Create Request</p>
                <select id="order-cat" class="text-sm mb-3"></select>
                <textarea id="order-desc" class="text-sm h-24 mb-4" placeholder="Description..."></textarea>
                <button class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-[10px] tracking-widest">Send</button>
            </div>
            <div class="glass-card p-6">
                <p class="text-[10px] font-black uppercase tracking-widest mb-4 text-slate-500 italic text-center">In Progress</p>
                <div id="active-tasks-list" class="space-y-1"></div>
            </div>
        </div>

        <div id="page-profile" class="page">
            <div class="glass-card p-8 mb-6 text-center">
                <img id="profile-avatar" src="" alt="👤" class="w-24 h-24 rounded-full mx-auto mb-4 border border-blue-600/20 shadow-lg object-cover">
                <h3 id="profile-name" class="text-2xl font-bold italic tracking-tight">--</h3>
                <p id="profile-role" class="text-[9px] text-blue-400 font-black uppercase tracking-[0.4em] mt-2">--</p>
                <p class="text-[10px] text-slate-500 mt-2 font-mono">Апартамент: <span id="apt-numbers">--</span></p>
                <button onclick="openModal('edit-profile')" class="mt-6 text-[10px] font-black uppercase bg-white/5 px-6 py-3 rounded-full text-slate-400 border border-white/5">Изменить</button>
            </div>

            <div class="glass-card p-8">
                <h4 class="text-xl font-bold italic mb-6">К оплате на <span id="payment-date" class="text-slate-400 text-sm font-medium">--</span></h4>
                <div class="space-y-1">
                    <div class="flex justify-between finance-item">
                        <span class="text-xs text-slate-500 font-medium">всего</span>
                        <span class="text-xl font-black"><span id="p-total-debt">0.00</span> €</span>
                    </div>
                    <div class="flex justify-between finance-item text-slate-300">
                        <span class="text-xs font-medium">содержание</span>
                        <span id="debt-maintenance" class="text-sm font-bold">0.00 €</span>
                    </div>
                </div>
            </div>
            
            <div id="admin-block" class="hidden mt-6">
                <button onclick="openModal('management')" class="w-full glass-card p-6 border-blue-500/20 text-[10px] font-black uppercase text-blue-400 italic">Control Panel</button>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-end justify-center" onclick="closeModal()">
        <div class="w-full bg-[#1e293b] rounded-t-[3.5rem] p-10 pb-16" onclick="event.stopPropagation()">
            <div id="modal-body" class="max-h-[60vh] overflow-y-auto"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 rounded-2xl bg-white/5 text-[9px] font-black uppercase tracking-widest text-slate-500">Close</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/80 backdrop-blur-xl border-t border-white/5 px-12 py-7 flex justify-between items-center z-50">
        <button onclick="switchPage('home')" id="nav-home" class="nav-btn active flex flex-col items-center">
            <span class="text-2xl">🏠</span>
            <span class="text-[8px] mt-1 font-black uppercase">Home</span>
        </button>
        <button onclick="switchPage('tasks')" id="nav-tasks" class="nav-btn flex flex-col items-center">
            <span class="text-2xl">📋</span>
            <span class="text-[8px] mt-1 font-black uppercase">Tasks</span>
        </button>
        <button onclick="switchPage('profile')" id="nav-profile" class="nav-btn flex flex-col items-center">
            <span class="text-2xl">👤</span>
            <span class="text-[8px] mt-1 font-black uppercase">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const API_URL = "https://sinuate-inez-proempire.ngrok-free.dev/api/data";
        let cachedData = null;

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            const user_id = urlParams.get('user_id') || tg.initDataUnsafe?.user?.id;

            if(tg.initDataUnsafe?.user?.photo_url) {
                document.getElementById('profile-avatar').src = tg.initDataUnsafe.user.photo_url;
            }
            document.getElementById('profile-name').innerText = tg.initDataUnsafe?.user?.first_name || 'Resident';

            try {
                const response = await fetch(`${API_URL}?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                cachedData = data;
                
                document.getElementById('complex-display-name').innerText = data.complex_name;
                document.getElementById('temp').innerText = data.weather.temp.replace('°C','');
                document.getElementById('humidity').innerText = data.weather.hum;
                document.getElementById('wind').innerText = (data.weather.wind || "0") + " m/s";
                
                document.getElementById('apt-numbers').innerText = data.apt || "--";
                document.getElementById('profile-role').innerText = data.role;
                document.getElementById('p-total-debt').innerText = data.finance.total;
                document.getElementById('debt-maintenance').innerText = data.finance.maintenance + " " + data.finance.currency;
                
                if (data.weather.time) {
                    document.getElementById('payment-date').innerText = data.weather.time.split(' ')[0];
                }

                const catSelect = document.getElementById('order-cat');
                if (data.services) {
                    catSelect.innerHTML = data.services.map(s => `<option value="${s}">${s}</option>`).join('');
                }

                if (['engineer', 'director', 'administrator', 'staff'].includes(data.role.toLowerCase())) {
                    document.getElementById('admin-block').classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        }

        function openModal(type) {
            const body = document.getElementById('modal-body');
            let html = "";

            if (type === 'emergency') {
                html = `<h2 class="text-xl font-bold mb-8 italic text-red-500">Emergency</h2>`;
                if (cachedData && cachedData.emergency && cachedData.emergency.length > 0) {
                    cachedData.emergency.forEach(e => {
                        html += `
                        <a href="tel:${e.Phone}" class="flex justify-between items-center p-2 bg-red-500/10 border border-red-500/20 rounded-3xl mb-3">
                            <span class="text-red-400 font-bold text-sm">${e.Name}</span>
                            <span class="bg-red-500 text-white text-[10px] px-3 py-1 rounded-full">${e.Phone}</span>
                        </a>`;
                    });
                } else {
                    html += `<p class="text-slate-500 text-center">Контакты не найдены</p>`;
                }
            } 
            else if (type === 'uk') {
                html = `<h2 class="text-xl font-bold mb-6 italic text-blue-400">Management Contacts</h2>`;
                if (cachedData && cachedData.management && cachedData.management.length > 0) {
                    cachedData.management.forEach(m => {
                        html += `
                        <div class="p-5 bg-white/5 border border-white/10 rounded-3xl mb-3">
                            <p class="text-[10px] uppercase font-black text-slate-500 mb-1">${m.Type}</p>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-sm text-white">${m.Value}</span>
                                <a href="https://t.me/${m.Value.replace('@','')}" target="_blank" class="bg-[#0088cc] text-white text-[9px] font-black px-4 py-2 rounded-xl uppercase">Chat</a>
                            </div>
                        </div>`;
                    });
                } else {
                    html += `<p class="text-slate-500 text-center">Контакты не найдены</p>`;
                }
            }
            else if (type === 'edit-profile') {
                html = `<h2 class="text-xl font-bold mb-6 italic">Edit Profile</h2>
                        <p class="text-[10px] text-slate-500 mb-4 uppercase font-black">Contacts for Management</p>
                        <input type="text" id="whatsapp-input" class="mb-3 text-sm" placeholder="WhatsApp (например +7...)">
                        <input type="email" id="email-input" class="mb-4 text-sm" placeholder="Email...">
                        <button onclick="saveProfile()" class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-[10px] tracking-widest">Save Changes</button>`;
            }

            body.innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function saveProfile() {
            // Заглушка для сохранения профиля
            tg.MainButton.setText("Данные обновлены!").show();
            setTimeout(() => { tg.MainButton.hide(); closeModal(); }, 2000);
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        
        loadData();
    </script>
</body>
</html>
