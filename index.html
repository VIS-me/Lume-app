<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 191, 36, 0.08);
        }
        /* Стиль модального окна */
        #modal-overlay {
            background: rgba(15, 17, 26, 0.85);
            backdrop-filter: blur(10px);
            display: none;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-[#0f111a] text-white font-sans min-h-screen pb-28 overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto p-5">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-[#0088cc] font-mono tracking-tight">
                LUME<sup class="text-xs ml-0.5 font-normal">©</sup>
            </h1>
            <div class="bg-blue-500/10 px-3 py-1 rounded-full text-[10px] text-blue-400 font-bold uppercase tracking-widest border border-blue-500/20">
                Live
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Welcome!</p>
                    <h2 id="complex-display-name" class="text-xl font-bold italic">LUME RESIDENCE</h2>
                    <p id="city-name" class="text-slate-500 text-xs mt-1">Budva, Montenegro</p>
                </div>
                <div class="text-right">
                    <span id="temp" class="text-4xl font-light tracking-tighter text-white">24°</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/5 text-slate-400">
                <div class="flex items-center text-xs">
                    <span class="mr-2">💧</span> <span id="humidity">--%</span>
                </div>
                <div class="flex items-center text-xs">
                    <span class="mr-2">💨</span> <span id="wind">-- м/с</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 mb-6">
            <h3 class="text-slate-500 text-[10px] uppercase tracking-[0.2em] mb-5 font-black text-center">Сервис и Контакты</h3>
            
            <div class="space-y-3">
                <button onclick="openModal('emergency')" class="w-full flex items-center bg-red-500/5 border border-red-500/10 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">⚠️</span>
                    <span class="text-sm font-bold text-red-400 uppercase tracking-tight">Экстренные телефоны</span>
                </button>

                <button onclick="openModal('uk')" class="w-full flex items-center bg-white/5 border border-white/5 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">📱</span>
                    <span class="text-sm font-bold text-slate-200 uppercase tracking-tight">Управляющая компания</span>
                </button>

                <button onclick="openModal('support')" class="w-full flex items-center bg-white/5 border border-white/5 p-4 rounded-2xl active:scale-[0.97] transition-all">
                    <span class="text-xl mr-4">✉️</span>
                    <span class="text-sm font-bold text-slate-200 uppercase tracking-tight">Поддержка</span>
                </button>
            </div>
        </div>

        <div id="admin-block" class="hidden">
            <button class="glass-card w-full rounded-[2rem] p-5 flex items-center justify-between border-blue-500/20 active:opacity-70 transition-all">
                <div class="flex items-center">
                    <span class="text-xl mr-4">🔑</span>
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest">Admin Panel</span>
                </div>
                <span class="text-slate-600">→</span>
            </button>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6" onclick="closeModal()">
        <div class="modal-content w-full max-w-xs rounded-[2.5rem] p-8 fade-in shadow-2xl" onclick="event.stopPropagation()">
            <div id="modal-body" class="text-center">
                </div>
            <button onclick="closeModal()" class="w-full mt-8 py-3 rounded-xl bg-white/10 text-xs font-bold uppercase tracking-widest text-slate-400">
                Закрыть
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f111a]/90 backdrop-blur-xl border-t border-white/5 px-12 py-6 flex justify-between items-center z-50">
        <button class="flex flex-col items-center text-blue-500">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Home</span>
        </button>
        <button class="flex flex-col items-center text-slate-700">
            <span class="text-xl">📋</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Tasks</span>
        </button>
        <button class="flex flex-col items-center text-slate-700">
            <span class="text-xl">👤</span>
            <span class="text-[9px] mt-1 font-black uppercase tracking-tighter">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const MODAL_DATA = {
            emergency: {
                title: "🚨 Экстренные службы",
                content: `
                    <div class="space-y-4 mt-4">
                        <a href="tel:122" class="block p-4 bg-red-500/10 rounded-2xl text-red-400 font-bold">Полиция (122)</a>
                        <a href="tel:124" class="block p-4 bg-red-500/10 rounded-2xl text-red-400 font-bold">Скорая (124)</a>
                        <a href="tel:123" class="block p-4 bg-red-500/10 rounded-2xl text-red-400 font-bold">Пожарные (123)</a>
                    </div>`
            },
            uk: {
                title: "🏢 Менеджер УК",
                content: `
                    <p class="text-slate-400 text-sm mb-6">Свяжитесь с нами в Telegram для решения бытовых вопросов</p>
                    <a href="https://t.me/manager_lume" class="block p-4 bg-blue-500 rounded-2xl text-white font-bold">Написать в Telegram</a>`
            },
            support: {
                title: "✉️ Поддержка",
                content: `
                    <p class="text-slate-400 text-sm mb-6">Техническая поддержка приложения</p>
                    <a href="mailto:support@lume.me" class="block p-4 bg-white/5 border border-white/10 rounded-2xl text-white font-bold">Отправить Email</a>`
            }
        };

        function openModal(type) {
            const body = document.getElementById('modal-body');
            body.innerHTML = `<h2 class="text-xl font-bold mb-2">${MODAL_DATA[type].title}</h2>` + MODAL_DATA[type].content;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const complex_id = urlParams.get('complex_id');
            const user_id = tg.initDataUnsafe?.user?.id || "6642689395"; 

            try {
                const response = await fetch(`https://sinuate-inez-proempire.ngrok-free.dev/api/data?user_id=${user_id}&complex_id=${complex_id}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                
                document.getElementById('complex-display-name').innerText = data.complex_name || "LUME";
                document.getElementById('temp').innerText = (data.weather.temp || "22") + "°";
                document.getElementById('humidity').innerText = (data.weather.hum || "0") + "%";
                document.getElementById('wind').innerText = (data.weather.wind || "0") + " м/с";
                
                if (data.role === 'director' || data.role === 'engineer') {
                    document.getElementById('admin-block').classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        }

        loadData();
    </script>
</body>
</html>
